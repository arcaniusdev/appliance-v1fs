AWSTemplateFormatVersion: "2010-09-09"
Description: TrendAI Service Gateway Scanner Infrastructure

Mappings:
  ServiceGatewayAMI:
    ap-northeast-1:
      AMI: ami-061b8e13afe1358d6
    ap-northeast-2:
      AMI: ami-06d290f555649e7cf
    ap-northeast-3:
      AMI: ami-00f25d39db251653f
    ap-south-1:
      AMI: ami-0a2f9a344b741d105
    ap-southeast-1:
      AMI: ami-0314c89685371c51b
    ap-southeast-2:
      AMI: ami-041754942552affa3
    ca-central-1:
      AMI: ami-07402a3cb195e17fc
    eu-central-1:
      AMI: ami-052395dc73896c7e9
    eu-north-1:
      AMI: ami-01da7559532215e43
    eu-west-1:
      AMI: ami-0464d17a390eaa185
    eu-west-2:
      AMI: ami-074a722115304208d
    eu-west-3:
      AMI: ami-0fb56479bb67150e8
    sa-east-1:
      AMI: ami-0fceef1ddaea68074
    us-east-1:
      AMI: ami-0cc07c329eab4df1c
    us-east-2:
      AMI: ami-070f04f9bc3eea5f5
    us-west-1:
      AMI: ami-0d82ee727bafa15e8
    us-west-2:
      AMI: ami-0bcbbe1b09927f3d7

Parameters:
  AZ1:
    Description: Availability Zone for Service Gateway 1
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1a
  AZ2:
    Description: Availability Zone for Service Gateway 2 (used when ServiceGatewayCount >= 2)
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1b
  AZ3:
    Description: Availability Zone for Service Gateway 3 (used when ServiceGatewayCount >= 3)
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1c
  AZ4:
    Description: Availability Zone for Service Gateway 4 (used when ServiceGatewayCount >= 4)
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1d
  AZ5:
    Description: Availability Zone for Service Gateway 5 (used when ServiceGatewayCount >= 5)
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1e
  AZ6:
    Description: Availability Zone for Service Gateway 6 (used when ServiceGatewayCount >= 6)
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1f
  AZ7:
    Description: Availability Zone for Service Gateway 7 (used when ServiceGatewayCount >= 7). Must be a valid AZ — update default for your region.
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1a
  AZ8:
    Description: Availability Zone for Service Gateway 8 (used when ServiceGatewayCount = 8). Must be a valid AZ — update default for your region.
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1b
  ServiceGatewayHostname:
    Description: Hostname prefix for Service Gateway appliances (numbered automatically)
    Type: String
    Default: FSVA-AWS
  ServiceGatewayCount:
    Description: Number of Service Gateways to run. One SG is deployed per AZ (AZ1..AZN).
    Type: Number
    Default: 6
    MinValue: 1
    MaxValue: 8
  ServiceGatewayInstanceType:
    Description: EC2 instance type for Service Gateway appliances (c5 family required by AMI)
    Type: String
    Default: c5.2xlarge
    AllowedValues:
      - c5.2xlarge
      - c5.4xlarge
      - c5.9xlarge
  MaxFileSizeMB:
    Description: Maximum file size in MB for gRPC scanning (nginx and gRPC channel limit)
    Type: Number
    Default: 500
    MinValue: 10
    MaxValue: 2048
  ScanCacheEnabled:
    Description: Enable Redis scan cache on Service Gateways (disable only for baseline testing)
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  VisionOneApiKey:
    Description: TrendAI Vision One API key for File Security SDK
    Type: String
    NoEcho: true
  SGRegistrationToken:
    Description: Service Gateway registration token from Vision One console
    Type: String
    NoEcho: true
  ExistingVPCId:
    Description: Use an existing VPC (e.g., vpc-0123456789abcdef0). Leave empty to create a new VPC.
    Type: String
    Default: ""
  ExistingPrivateSubnet1Id:
    Description: Existing private subnet in AZ1. Required if ExistingVPCId is set.
    Type: String
    Default: ""
  ExistingPrivateSubnet2Id:
    Description: Existing private subnet in AZ2. Required if ExistingVPCId is set and ServiceGatewayCount >= 2.
    Type: String
    Default: ""
  ExistingPrivateSubnet3Id:
    Description: Existing private subnet in AZ3. Required if ExistingVPCId is set and ServiceGatewayCount >= 3.
    Type: String
    Default: ""
  ExistingPrivateSubnet4Id:
    Description: Existing private subnet in AZ4. Required if ExistingVPCId is set and ServiceGatewayCount >= 4.
    Type: String
    Default: ""
  ExistingPrivateSubnet5Id:
    Description: Existing private subnet in AZ5. Required if ExistingVPCId is set and ServiceGatewayCount >= 5.
    Type: String
    Default: ""
  ExistingPrivateSubnet6Id:
    Description: Existing private subnet in AZ6. Required if ExistingVPCId is set and ServiceGatewayCount >= 6.
    Type: String
    Default: ""
  ExistingPrivateSubnet7Id:
    Description: Existing private subnet in AZ7. Required if ExistingVPCId is set and ServiceGatewayCount >= 7.
    Type: String
    Default: ""
  ExistingPrivateSubnet8Id:
    Description: Existing private subnet in AZ8. Required if ExistingVPCId is set and ServiceGatewayCount = 8.
    Type: String
    Default: ""

Conditions:
  CreateNetworking: !Equals [!Ref ExistingVPCId, ""]
  CreateSG2: !Not [!Equals [!Ref ServiceGatewayCount, "1"]]
  CreateSG3: !And
    - !Not [!Equals [!Ref ServiceGatewayCount, "1"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "2"]]
  CreateSG4: !And
    - !Not [!Equals [!Ref ServiceGatewayCount, "1"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "2"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "3"]]
  CreateSG5: !And
    - !Not [!Equals [!Ref ServiceGatewayCount, "1"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "2"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "3"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "4"]]
  CreateSG6: !And
    - !Not [!Equals [!Ref ServiceGatewayCount, "1"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "2"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "3"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "4"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "5"]]
  CreateSG7: !And
    - !Not [!Equals [!Ref ServiceGatewayCount, "1"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "2"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "3"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "4"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "5"]]
    - !Not [!Equals [!Ref ServiceGatewayCount, "6"]]
  CreateSG8: !Equals [!Ref ServiceGatewayCount, "8"]
  # Per-AZ subnet conditions (CreateNetworking AND CreateSGN)
  CreateSubnet3:
    Fn::And:
      - Condition: CreateNetworking
      - Condition: CreateSG3
  CreateSubnet4:
    Fn::And:
      - Condition: CreateNetworking
      - Condition: CreateSG4
  CreateSubnet5:
    Fn::And:
      - Condition: CreateNetworking
      - Condition: CreateSG5
  CreateSubnet6:
    Fn::And:
      - Condition: CreateNetworking
      - Condition: CreateSG6
  CreateSubnet7:
    Fn::And:
      - Condition: CreateNetworking
      - Condition: CreateSG7
  CreateSubnet8:
    Fn::And:
      - Condition: CreateNetworking
      - Condition: CreateSG8

Resources:
  # ── VPC ──────────────────────────────────────────────────────────────
  BaseVPC:
    Condition: CreateNetworking
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.2.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Sub BaseVPC-${AWS::StackName}

  # ── Internet Gateway ────────────────────────────────────────────────
  IG:
    Condition: CreateNetworking
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub IG-${AWS::StackName}

  VPCIG:
    Condition: CreateNetworking
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref IG
      VpcId: !Ref BaseVPC

  # ── Public Subnets ──────────────────────────────────────────────────
  PublicSubnet1:
    Condition: CreateNetworking
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.0.0/22
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ1
      Tags:
        - Key: Name
          Value: !Sub PublicSubnet1-${AWS::StackName}

  PublicSubnet2:
    Condition: CreateNetworking
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.4.0/22
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ2
      Tags:
        - Key: Name
          Value: !Sub PublicSubnet2-${AWS::StackName}

  PublicSubnet3:
    Condition: CreateSubnet3
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.8.0/24
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ3
      Tags:
        - Key: Name
          Value: !Sub PublicSubnet3-${AWS::StackName}

  PublicSubnet4:
    Condition: CreateSubnet4
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.9.0/24
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ4
      Tags:
        - Key: Name
          Value: !Sub PublicSubnet4-${AWS::StackName}

  PublicSubnet5:
    Condition: CreateSubnet5
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.10.0/24
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ5
      Tags:
        - Key: Name
          Value: !Sub PublicSubnet5-${AWS::StackName}

  PublicSubnet6:
    Condition: CreateSubnet6
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.11.0/24
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ6
      Tags:
        - Key: Name
          Value: !Sub PublicSubnet6-${AWS::StackName}

  PublicSubnet7:
    Condition: CreateSubnet7
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.12.0/24
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ7
      Tags:
        - Key: Name
          Value: !Sub PublicSubnet7-${AWS::StackName}

  PublicSubnet8:
    Condition: CreateSubnet8
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.13.0/24
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ8
      Tags:
        - Key: Name
          Value: !Sub PublicSubnet8-${AWS::StackName}

  # ── Private Subnets ─────────────────────────────────────────────────
  PrivateSubnet1:
    Condition: CreateNetworking
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.32.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ1
      Tags:
        - Key: Name
          Value: !Sub PrivateSubnet1-${AWS::StackName}

  PrivateSubnet2:
    Condition: CreateNetworking
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.48.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ2
      Tags:
        - Key: Name
          Value: !Sub PrivateSubnet2-${AWS::StackName}

  PrivateSubnet3:
    Condition: CreateSubnet3
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.64.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ3
      Tags:
        - Key: Name
          Value: !Sub PrivateSubnet3-${AWS::StackName}

  PrivateSubnet4:
    Condition: CreateSubnet4
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.80.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ4
      Tags:
        - Key: Name
          Value: !Sub PrivateSubnet4-${AWS::StackName}

  PrivateSubnet5:
    Condition: CreateSubnet5
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.96.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ5
      Tags:
        - Key: Name
          Value: !Sub PrivateSubnet5-${AWS::StackName}

  PrivateSubnet6:
    Condition: CreateSubnet6
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.112.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ6
      Tags:
        - Key: Name
          Value: !Sub PrivateSubnet6-${AWS::StackName}

  PrivateSubnet7:
    Condition: CreateSubnet7
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.128.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ7
      Tags:
        - Key: Name
          Value: !Sub PrivateSubnet7-${AWS::StackName}

  PrivateSubnet8:
    Condition: CreateSubnet8
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.144.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref AZ8
      Tags:
        - Key: Name
          Value: !Sub PrivateSubnet8-${AWS::StackName}

  # ── NAT Gateway EIPs ────────────────────────────────────────────────
  NGWEIP1:
    Condition: CreateNetworking
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP1-${AWS::StackName}

  NGWEIP2:
    Condition: CreateNetworking
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP2-${AWS::StackName}

  NGWEIP3:
    Condition: CreateSubnet3
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP3-${AWS::StackName}

  NGWEIP4:
    Condition: CreateSubnet4
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP4-${AWS::StackName}

  NGWEIP5:
    Condition: CreateSubnet5
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP5-${AWS::StackName}

  NGWEIP6:
    Condition: CreateSubnet6
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP6-${AWS::StackName}

  NGWEIP7:
    Condition: CreateSubnet7
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP7-${AWS::StackName}

  NGWEIP8:
    Condition: CreateSubnet8
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP8-${AWS::StackName}

  # ── NAT Gateways ────────────────────────────────────────────────────
  NGW1:
    Condition: CreateNetworking
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP1.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub NGW1-${AWS::StackName}

  NGW2:
    Condition: CreateNetworking
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP2.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub NGW2-${AWS::StackName}

  NGW3:
    Condition: CreateSubnet3
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP3.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet3
      Tags:
        - Key: Name
          Value: !Sub NGW3-${AWS::StackName}

  NGW4:
    Condition: CreateSubnet4
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP4.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet4
      Tags:
        - Key: Name
          Value: !Sub NGW4-${AWS::StackName}

  NGW5:
    Condition: CreateSubnet5
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP5.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet5
      Tags:
        - Key: Name
          Value: !Sub NGW5-${AWS::StackName}

  NGW6:
    Condition: CreateSubnet6
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP6.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet6
      Tags:
        - Key: Name
          Value: !Sub NGW6-${AWS::StackName}

  NGW7:
    Condition: CreateSubnet7
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP7.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet7
      Tags:
        - Key: Name
          Value: !Sub NGW7-${AWS::StackName}

  NGW8:
    Condition: CreateSubnet8
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP8.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet8
      Tags:
        - Key: Name
          Value: !Sub NGW8-${AWS::StackName}

  # ── Public Route Tables ─────────────────────────────────────────────
  PublicRT1:
    Condition: CreateNetworking
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT1-${AWS::StackName}

  PublicRoute1:
    Condition: CreateNetworking
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT1
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  PublicRT2:
    Condition: CreateNetworking
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT2-${AWS::StackName}

  PublicRoute2:
    Condition: CreateNetworking
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT2
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  PublicRT3:
    Condition: CreateSubnet3
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT3-${AWS::StackName}

  PublicRoute3:
    Condition: CreateSubnet3
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT3
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  PublicRT4:
    Condition: CreateSubnet4
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT4-${AWS::StackName}

  PublicRoute4:
    Condition: CreateSubnet4
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT4
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  PublicRT5:
    Condition: CreateSubnet5
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT5-${AWS::StackName}

  PublicRoute5:
    Condition: CreateSubnet5
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT5
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  PublicRT6:
    Condition: CreateSubnet6
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT6-${AWS::StackName}

  PublicRoute6:
    Condition: CreateSubnet6
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT6
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  PublicRT7:
    Condition: CreateSubnet7
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT7-${AWS::StackName}

  PublicRoute7:
    Condition: CreateSubnet7
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT7
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  PublicRT8:
    Condition: CreateSubnet8
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT8-${AWS::StackName}

  PublicRoute8:
    Condition: CreateSubnet8
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT8
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  # ── Private Route Tables ────────────────────────────────────────────
  PrivateRT1:
    Condition: CreateNetworking
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PrivateRT1-${AWS::StackName}

  PrivateRoute1:
    Condition: CreateNetworking
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRT1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NGW1

  PrivateRT2:
    Condition: CreateNetworking
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PrivateRT2-${AWS::StackName}

  PrivateRoute2:
    Condition: CreateNetworking
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRT2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NGW2

  PrivateRT3:
    Condition: CreateSubnet3
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PrivateRT3-${AWS::StackName}

  PrivateRoute3:
    Condition: CreateSubnet3
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRT3
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NGW3

  PrivateRT4:
    Condition: CreateSubnet4
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PrivateRT4-${AWS::StackName}

  PrivateRoute4:
    Condition: CreateSubnet4
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRT4
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NGW4

  PrivateRT5:
    Condition: CreateSubnet5
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PrivateRT5-${AWS::StackName}

