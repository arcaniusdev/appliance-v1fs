  # ── VPC Flow Logs ──────────────────────────────────────────────────
  FlowLogGroup:
    Condition: CreateNetworking
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub vpc-flow-logs-${AWS::StackName}
      RetentionInDays: 30

  FlowLogRole:
    Condition: CreateNetworking
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FlowLogPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:vpc-flow-logs-${AWS::StackName}"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:vpc-flow-logs-${AWS::StackName}:*"

  VPCFlowLog:
    Condition: CreateNetworking
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref BaseVPC
      ResourceType: VPC
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref FlowLogGroup
      DeliverLogsPermissionArn: !GetAtt FlowLogRole.Arn
      Tags:
        - Key: Name
          Value: !Sub VPCFlowLog-${AWS::StackName}

  # ── S3 Gateway VPC Endpoint ────────────────────────────────────────
  S3GatewayEndpoint:
    Condition: CreateNetworking
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRT1
        - !Ref PrivateRT2
        - !If [CreateSG3, !Ref PrivateRT3, !Ref AWS::NoValue]
        - !If [CreateSG4, !Ref PrivateRT4, !Ref AWS::NoValue]
        - !If [CreateSG5, !Ref PrivateRT5, !Ref AWS::NoValue]
        - !If [CreateSG6, !Ref PrivateRT6, !Ref AWS::NoValue]
        - !If [CreateSG7, !Ref PrivateRT7, !Ref AWS::NoValue]
        - !If [CreateSG8, !Ref PrivateRT8, !Ref AWS::NoValue]

  # ── Interface VPC Endpoints (keep AWS API traffic off the internet) ─
  VPCEndpointSecGroup:
    Condition: CreateNetworking
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref BaseVPC
      GroupDescription: HTTPS access for VPC Interface Endpoints
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.2.0.0/16
          Description: HTTPS from VPC
      Tags:
        - Key: Name
          Value: !Sub VPCEndpointSG-${AWS::StackName}

  SecretsManagerEndpoint:
    Condition: CreateNetworking
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.secretsmanager
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !If [CreateSG3, !Ref PrivateSubnet3, !Ref AWS::NoValue]
        - !If [CreateSG4, !Ref PrivateSubnet4, !Ref AWS::NoValue]
        - !If [CreateSG5, !Ref PrivateSubnet5, !Ref AWS::NoValue]
        - !If [CreateSG6, !Ref PrivateSubnet6, !Ref AWS::NoValue]
        - !If [CreateSG7, !Ref PrivateSubnet7, !Ref AWS::NoValue]
        - !If [CreateSG8, !Ref PrivateSubnet8, !Ref AWS::NoValue]
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  SQSEndpoint:
    Condition: CreateNetworking
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.sqs
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !If [CreateSG3, !Ref PrivateSubnet3, !Ref AWS::NoValue]
        - !If [CreateSG4, !Ref PrivateSubnet4, !Ref AWS::NoValue]
        - !If [CreateSG5, !Ref PrivateSubnet5, !Ref AWS::NoValue]
        - !If [CreateSG6, !Ref PrivateSubnet6, !Ref AWS::NoValue]
        - !If [CreateSG7, !Ref PrivateSubnet7, !Ref AWS::NoValue]
        - !If [CreateSG8, !Ref PrivateSubnet8, !Ref AWS::NoValue]
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  CloudWatchLogsEndpoint:
    Condition: CreateNetworking
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.logs
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !If [CreateSG3, !Ref PrivateSubnet3, !Ref AWS::NoValue]
        - !If [CreateSG4, !Ref PrivateSubnet4, !Ref AWS::NoValue]
        - !If [CreateSG5, !Ref PrivateSubnet5, !Ref AWS::NoValue]
        - !If [CreateSG6, !Ref PrivateSubnet6, !Ref AWS::NoValue]
        - !If [CreateSG7, !Ref PrivateSubnet7, !Ref AWS::NoValue]
        - !If [CreateSG8, !Ref PrivateSubnet8, !Ref AWS::NoValue]
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  SSMEndpoint:
    Condition: CreateNetworking
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ssm
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !If [CreateSG3, !Ref PrivateSubnet3, !Ref AWS::NoValue]
        - !If [CreateSG4, !Ref PrivateSubnet4, !Ref AWS::NoValue]
        - !If [CreateSG5, !Ref PrivateSubnet5, !Ref AWS::NoValue]
        - !If [CreateSG6, !Ref PrivateSubnet6, !Ref AWS::NoValue]
        - !If [CreateSG7, !Ref PrivateSubnet7, !Ref AWS::NoValue]
        - !If [CreateSG8, !Ref PrivateSubnet8, !Ref AWS::NoValue]
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  STSEndpoint:
    Condition: CreateNetworking
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.sts
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !If [CreateSG3, !Ref PrivateSubnet3, !Ref AWS::NoValue]
        - !If [CreateSG4, !Ref PrivateSubnet4, !Ref AWS::NoValue]
        - !If [CreateSG5, !Ref PrivateSubnet5, !Ref AWS::NoValue]
        - !If [CreateSG6, !Ref PrivateSubnet6, !Ref AWS::NoValue]
        - !If [CreateSG7, !Ref PrivateSubnet7, !Ref AWS::NoValue]
        - !If [CreateSG8, !Ref PrivateSubnet8, !Ref AWS::NoValue]
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  SSMMessagesEndpoint:
    Condition: CreateNetworking
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ssmmessages
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !If [CreateSG3, !Ref PrivateSubnet3, !Ref AWS::NoValue]
        - !If [CreateSG4, !Ref PrivateSubnet4, !Ref AWS::NoValue]
        - !If [CreateSG5, !Ref PrivateSubnet5, !Ref AWS::NoValue]
        - !If [CreateSG6, !Ref PrivateSubnet6, !Ref AWS::NoValue]
        - !If [CreateSG7, !Ref PrivateSubnet7, !Ref AWS::NoValue]
        - !If [CreateSG8, !Ref PrivateSubnet8, !Ref AWS::NoValue]
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  EC2MessagesEndpoint:
    Condition: CreateNetworking
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ec2messages
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !If [CreateSG3, !Ref PrivateSubnet3, !Ref AWS::NoValue]
        - !If [CreateSG4, !Ref PrivateSubnet4, !Ref AWS::NoValue]
        - !If [CreateSG5, !Ref PrivateSubnet5, !Ref AWS::NoValue]
        - !If [CreateSG6, !Ref PrivateSubnet6, !Ref AWS::NoValue]
        - !If [CreateSG7, !Ref PrivateSubnet7, !Ref AWS::NoValue]
        - !If [CreateSG8, !Ref PrivateSubnet8, !Ref AWS::NoValue]
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  EC2Endpoint:
    Condition: CreateNetworking
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ec2
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !If [CreateSG3, !Ref PrivateSubnet3, !Ref AWS::NoValue]
        - !If [CreateSG4, !Ref PrivateSubnet4, !Ref AWS::NoValue]
        - !If [CreateSG5, !Ref PrivateSubnet5, !Ref AWS::NoValue]
        - !If [CreateSG6, !Ref PrivateSubnet6, !Ref AWS::NoValue]
        - !If [CreateSG7, !Ref PrivateSubnet7, !Ref AWS::NoValue]
        - !If [CreateSG8, !Ref PrivateSubnet8, !Ref AWS::NoValue]
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  # ── SSH Key Pair ────────────────────────────────────────────────────
  ServiceGatewayKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub ServiceGatewayKeyPair-${AWS::StackName}
      KeyType: ed25519
      Tags:
        - Key: Name
          Value: !Sub ServiceGatewayKeyPair-${AWS::StackName}

  # ── Service Gateway Security Group ───────────────────────────────────
  ServiceGatewaySecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !If [CreateNetworking, !Ref BaseVPC, !Ref ExistingVPCId]
      GroupDescription: Service Gateway appliance - inbound scan traffic and management
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 10.2.0.0/16
          Description: HTTP from VPC (gRPC h2c, no TLS)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.2.0.0/16
          Description: HTTPS from VPC (gRPC TLS, management)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 10.2.0.0/16
          Description: SSH from VPC (CLI management)
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS outbound (Vision One, updates)
      Tags:
        - Key: Name
          Value: !Sub ServiceGatewaySecGroup-${AWS::StackName}

  # ── Service Gateway IAM ───────────────────────────────────────────────
  ServiceGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  ServiceGatewayInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ServiceGatewayRole

  ServiceGatewayLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ServiceGateway-${AWS::StackName}
      LaunchTemplateData:
        ImageId: !FindInMap [ServiceGatewayAMI, !Ref "AWS::Region", AMI]
        InstanceType: !Ref ServiceGatewayInstanceType
        KeyName: !Ref ServiceGatewayKeyPair
        IamInstanceProfile:
          Arn: !GetAtt ServiceGatewayInstanceProfile.Arn
        SecurityGroupIds:
          - !Ref ServiceGatewaySecGroup
        BlockDeviceMappings:
          - DeviceName: /dev/sda1
            Ebs:
              VolumeSize: 200
              VolumeType: gp3
              Encrypted: true
        MetadataOptions:
          HttpTokens: required
        DisableApiTermination: true
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: appliance-v1fs:stack
                Value: !Ref "AWS::StackName"

  # ── Service Gateway Instances (one per AZ) ──────────────────────────
  ServiceGateway01:
    Type: AWS::EC2::Instance
    DependsOn: WatchdogPermission
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref ServiceGatewayLaunchTemplate
        Version: !GetAtt ServiceGatewayLaunchTemplate.LatestVersionNumber
      SubnetId: !If [CreateNetworking, !Ref PrivateSubnet1, !Ref ExistingPrivateSubnet1Id]
      Tags:
        - Key: Name
          Value: !Sub ${ServiceGatewayHostname}-01

  ServiceGateway02:
    Type: AWS::EC2::Instance
    Condition: CreateSG2
    DependsOn: WatchdogPermission
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref ServiceGatewayLaunchTemplate
        Version: !GetAtt ServiceGatewayLaunchTemplate.LatestVersionNumber
      SubnetId: !If [CreateNetworking, !Ref PrivateSubnet2, !Ref ExistingPrivateSubnet2Id]
      Tags:
        - Key: Name
          Value: !Sub ${ServiceGatewayHostname}-02

  ServiceGateway03:
    Type: AWS::EC2::Instance
    Condition: CreateSG3
    DependsOn: WatchdogPermission
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref ServiceGatewayLaunchTemplate
        Version: !GetAtt ServiceGatewayLaunchTemplate.LatestVersionNumber
      SubnetId: !If [CreateNetworking, !Ref PrivateSubnet3, !Ref ExistingPrivateSubnet3Id]
      Tags:
        - Key: Name
          Value: !Sub ${ServiceGatewayHostname}-03

  ServiceGateway04:
    Type: AWS::EC2::Instance
    Condition: CreateSG4
    DependsOn: WatchdogPermission
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref ServiceGatewayLaunchTemplate
        Version: !GetAtt ServiceGatewayLaunchTemplate.LatestVersionNumber
      SubnetId: !If [CreateNetworking, !Ref PrivateSubnet4, !Ref ExistingPrivateSubnet4Id]
      Tags:
        - Key: Name
          Value: !Sub ${ServiceGatewayHostname}-04

  ServiceGateway05:
    Type: AWS::EC2::Instance
    Condition: CreateSG5
    DependsOn: WatchdogPermission
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref ServiceGatewayLaunchTemplate
        Version: !GetAtt ServiceGatewayLaunchTemplate.LatestVersionNumber
      SubnetId: !If [CreateNetworking, !Ref PrivateSubnet5, !Ref ExistingPrivateSubnet5Id]
      Tags:
        - Key: Name
          Value: !Sub ${ServiceGatewayHostname}-05

  ServiceGateway06:
    Type: AWS::EC2::Instance
    Condition: CreateSG6
    DependsOn: WatchdogPermission
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref ServiceGatewayLaunchTemplate
        Version: !GetAtt ServiceGatewayLaunchTemplate.LatestVersionNumber
      SubnetId: !If [CreateNetworking, !Ref PrivateSubnet6, !Ref ExistingPrivateSubnet6Id]
      Tags:
        - Key: Name
          Value: !Sub ${ServiceGatewayHostname}-06

  ServiceGateway07:
    Type: AWS::EC2::Instance
    Condition: CreateSG7
    DependsOn: WatchdogPermission
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref ServiceGatewayLaunchTemplate
        Version: !GetAtt ServiceGatewayLaunchTemplate.LatestVersionNumber
      SubnetId: !If [CreateNetworking, !Ref PrivateSubnet7, !Ref ExistingPrivateSubnet7Id]
      Tags:
        - Key: Name
          Value: !Sub ${ServiceGatewayHostname}-07

  ServiceGateway08:
    Type: AWS::EC2::Instance
    Condition: CreateSG8
    DependsOn: WatchdogPermission
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref ServiceGatewayLaunchTemplate
        Version: !GetAtt ServiceGatewayLaunchTemplate.LatestVersionNumber
      SubnetId: !If [CreateNetworking, !Ref PrivateSubnet8, !Ref ExistingPrivateSubnet8Id]
      Tags:
        - Key: Name
          Value: !Sub ${ServiceGatewayHostname}-08

  # ── Private Hosted Zone (TLS hostname matching) ────────────────────
  # The SG wildcard cert (*.sgi.xdr.trendmicro.com) requires connections
  # to a matching hostname for TLS to validate. This private zone resolves
  # per-SG hostnames to their private IPs within the VPC.
  ScannerHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: sgi.xdr.trendmicro.com
      VPCs:
        - VPCId: !If [CreateNetworking, !Ref BaseVPC, !Ref ExistingVPCId]
          VPCRegion: !Ref "AWS::Region"

  ServiceGateway01DNS:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref ScannerHostedZone
      Name: !Sub "${ServiceGatewayHostname}-01.sgi.xdr.trendmicro.com"
      Type: A
      TTL: 10
      ResourceRecords:
        - !GetAtt ServiceGateway01.PrivateIp

  ServiceGateway02DNS:
    Condition: CreateSG2
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref ScannerHostedZone
      Name: !Sub "${ServiceGatewayHostname}-02.sgi.xdr.trendmicro.com"
      Type: A
      TTL: 10
      ResourceRecords:
        - !GetAtt ServiceGateway02.PrivateIp

  ServiceGateway03DNS:
    Condition: CreateSG3
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref ScannerHostedZone
      Name: !Sub "${ServiceGatewayHostname}-03.sgi.xdr.trendmicro.com"
      Type: A
      TTL: 10
      ResourceRecords:
        - !GetAtt ServiceGateway03.PrivateIp

  ServiceGateway04DNS:
    Condition: CreateSG4
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref ScannerHostedZone
      Name: !Sub "${ServiceGatewayHostname}-04.sgi.xdr.trendmicro.com"
      Type: A
      TTL: 10
      ResourceRecords:
        - !GetAtt ServiceGateway04.PrivateIp

  ServiceGateway05DNS:
    Condition: CreateSG5
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref ScannerHostedZone
      Name: !Sub "${ServiceGatewayHostname}-05.sgi.xdr.trendmicro.com"
      Type: A
      TTL: 10
      ResourceRecords:
        - !GetAtt ServiceGateway05.PrivateIp

  ServiceGateway06DNS:
    Condition: CreateSG6
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref ScannerHostedZone
      Name: !Sub "${ServiceGatewayHostname}-06.sgi.xdr.trendmicro.com"
      Type: A
      TTL: 10
      ResourceRecords:
        - !GetAtt ServiceGateway06.PrivateIp

  ServiceGateway07DNS:
    Condition: CreateSG7
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref ScannerHostedZone
      Name: !Sub "${ServiceGatewayHostname}-07.sgi.xdr.trendmicro.com"
      Type: A
      TTL: 10
      ResourceRecords:
        - !GetAtt ServiceGateway07.PrivateIp

  ServiceGateway08DNS:
    Condition: CreateSG8
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref ScannerHostedZone
      Name: !Sub "${ServiceGatewayHostname}-08.sgi.xdr.trendmicro.com"
      Type: A
      TTL: 10
      ResourceRecords:
        - !GetAtt ServiceGateway08.PrivateIp

  # ── Scanner Deploy Bucket & CodeBuild ─────────────────────────────
  ScannerDeployBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub ScannerDeployBucket-${AWS::StackName}

  ScannerDeployBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ScannerDeployBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyNonHTTPS
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt ScannerDeployBucket.Arn
              - !Sub "${ScannerDeployBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"

  ScannerCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ScannerCodeBuildPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${ScannerDeployBucket}/*"

  ScannerCodeBuildProject:
    Type: AWS::CodeBuild::Project
    DependsOn: ScannerDeployBucket
    Properties:
      Name: !Sub scanner-build-${AWS::StackName}
      ServiceRole: !GetAtt ScannerCodeBuildRole.Arn
      TimeoutInMinutes: 15
      Environment:
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        Type: LINUX_CONTAINER
        EnvironmentVariables:
          - Name: DEPLOY_BUCKET
            Value: !Ref ScannerDeployBucket
      Source:
        Type: GITHUB
        Location: https://github.com/arcaniusdev/appliance-v1fs.git
        BuildSpec: buildspec-scanner.yml
      Artifacts:
        Type: NO_ARTIFACTS

  ScannerCodeBuildTriggerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TriggerBuild
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt ScannerCodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:DeleteObject
                  - s3:ListBucketVersions
                  - s3:DeleteObjectVersion
                Resource:
                  - !GetAtt ScannerDeployBucket.Arn
                  - !Sub "${ScannerDeployBucket.Arn}/*"

  ScannerCodeBuildTrigger:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub scanner-build-trigger-${AWS::StackName}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ScannerCodeBuildTriggerRole.Arn
      Timeout: 900
      TracingConfig:
        Mode: Active
      Code:
        ZipFile: |
          import boto3, json, time, urllib.request

          def handler(event, context):
              cb = boto3.client("codebuild")
              props = event.get("ResourceProperties", {})
              project = props["ProjectName"]

              if event["RequestType"] == "Delete":
                  bucket = props.get("DeployBucket", "")
                  if bucket:
                      s3 = boto3.client("s3")
                      try:
                          while True:
                              objs = s3.list_object_versions(Bucket=bucket, MaxKeys=1000)
                              to_delete = [{"Key": o["Key"], "VersionId": o["VersionId"]} for o in objs.get("Versions", [])]
                              to_delete += [{"Key": o["Key"], "VersionId": o["VersionId"]} for o in objs.get("DeleteMarkers", [])]
                              if not to_delete:
                                  break
                              s3.delete_objects(Bucket=bucket, Delete={"Objects": to_delete})
                      except Exception as e:
                          print(f"Bucket cleanup warning: {e}")
                  return send(event, context, "SUCCESS", {})

              try:
                  resp = cb.start_build(projectName=project)
                  build_id = resp["build"]["id"]
                  while True:
                      time.sleep(15)
                      builds = cb.batch_get_builds(ids=[build_id])["builds"]
                      status = builds[0]["buildStatus"]
                      if status == "SUCCEEDED":
                          return send(event, context, "SUCCESS", {"BuildId": build_id})
                      if status in ("FAILED", "FAULT", "STOPPED", "TIMED_OUT"):
                          return send(event, context, "FAILED", {}, f"Build {status}: {build_id}")
                      remaining = context.get_remaining_time_in_millis()
                      if remaining < 30000:
                          return send(event, context, "FAILED", {}, "Lambda timeout waiting for build")
              except Exception as e:
                  return send(event, context, "FAILED", {}, str(e))

          def send(event, context, status, data, reason=""):
              body = json.dumps({
                  "Status": status,
                  "Reason": reason or f"See CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data,
              }).encode()
              req = urllib.request.Request(event["ResponseURL"], data=body, method="PUT")
              req.add_header("Content-Type", "")
              req.add_header("Content-Length", str(len(body)))
              urllib.request.urlopen(req)

  ScannerCodeBuild:
    Type: Custom::CodeBuild
    DependsOn: ScannerDeployBucket
    Properties:
      ServiceToken: !GetAtt ScannerCodeBuildTrigger.Arn
      ProjectName: !Ref ScannerCodeBuildProject
      DeployBucket: !Ref ScannerDeployBucket

  # ── Provisioner Layer ──────────────────────────────────────────────
  ProvisionerLayer:
    Type: AWS::Lambda::LayerVersion
    DependsOn: ScannerCodeBuild
    Properties:
      LayerName: !Sub provisioner-deps-${AWS::StackName}
      Content:
        S3Bucket: !Ref ScannerDeployBucket
        S3Key: provisioner-layer.zip
      CompatibleRuntimes:
        - python3.12

  # ── Provisioner Lambda ──────────────────────────────────────────────
  ProvisionerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: ProvisionerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/ec2/keypair/*"
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:PutSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/*"
              - Effect: Allow
                Action: ec2:DescribeInstances
                Resource: "*"
              - Effect: Allow
                Action: ec2:CreateTags
                Resource: !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance:*"
                Condition:
                  StringEquals:
                    "aws:ResourceTag/appliance-v1fs:stack": !Ref "AWS::StackName"
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/appliance-v1fs/*"
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/*"

  ProvisionerLambda:
    Type: AWS::Lambda::Function
    DependsOn: ScannerCodeBuild
    Properties:
      FunctionName: !Sub provisioner-${AWS::StackName}
      Runtime: python3.12
      Handler: handler.handler
      Code:
        S3Bucket: !Ref ScannerDeployBucket
        S3Key: provisioner-code.zip
      Layers:
        - !Ref ProvisionerLayer
      Role: !GetAtt ProvisionerLambdaRole.Arn
      Timeout: 900
      MemorySize: 256
      TracingConfig:
        Mode: Active
      VpcConfig:
        SubnetIds:
          - !If [CreateNetworking, !Ref PrivateSubnet1, !Ref ExistingPrivateSubnet1Id]
          - !If [CreateNetworking, !Ref PrivateSubnet2, !Ref ExistingPrivateSubnet2Id]
        SecurityGroupIds:
          - !Ref ProvisionerLambdaSecGroup
      Environment:
        Variables:
          SG_TAG_KEY: "appliance-v1fs:stack"
          SG_TAG_VALUE: !Ref "AWS::StackName"
          KEY_PAIR_ID: !GetAtt ServiceGatewayKeyPair.KeyPairId
          CERT_SECRET_NAME: appliance-v1fs/sg-ca-cert
          REGISTRATION_TOKEN_SECRET: appliance-v1fs/sg-registration-token
          AWS_REGION_NAME: !Ref "AWS::Region"
          DEPLOY_BUCKET: !Ref ScannerDeployBucket
          MAX_FILE_SIZE_MB: !Ref MaxFileSizeMB
          SCAN_CACHE_ENABLED: !Ref ScanCacheEnabled

  WatchdogSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub watchdog-${AWS::StackName}
      Description: Check SG scanner versions and re-apply customizations if updated
      ScheduleExpression: rate(15 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt ProvisionerLambda.Arn
          Id: WatchdogTarget
          Input: '{"action": "watchdog"}'

  WatchdogPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProvisionerLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WatchdogSchedule.Arn

  # ── Provisioner Lambda Security Group ─────────────────────────────
  ProvisionerLambdaSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !If [CreateNetworking, !Ref BaseVPC, !Ref ExistingVPCId]
      GroupDescription: Provisioner Lambda - outbound SSH to Service Gateways and HTTPS to VPC endpoints
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 10.2.0.0/16
          Description: SSH to Service Gateway instances
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.2.0.0/16
          Description: HTTPS to VPC endpoints (Secrets Manager, SSM, EC2)
      Tags:
        - Key: Name
          Value: !Sub ProvisionerLambdaSG-${AWS::StackName}

  # ── Secrets (API key + registration token) ─────────────────────────
  VisionOneApiKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: appliance-v1fs/vision-one-api-key
      Description: TrendAI Vision One API key for File Security SDK
      SecretString: !Ref VisionOneApiKey

  SGRegistrationTokenSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: appliance-v1fs/sg-registration-token
      Description: Service Gateway registration token from Vision One
      SecretString: !Ref SGRegistrationToken

Outputs:
  VPCId:
    Description: VPC ID
    Value: !If [CreateNetworking, !Ref BaseVPC, !Ref ExistingVPCId]
    Export:
      Name: !Sub ${AWS::StackName}-VPCId
  PrivateSubnet1Id:
    Description: Private subnet in AZ1
    Value: !If [CreateNetworking, !Ref PrivateSubnet1, !Ref ExistingPrivateSubnet1Id]
    Export:
      Name: !Sub ${AWS::StackName}-PrivateSubnet1Id
  PrivateSubnet2Id:
    Description: Private subnet in AZ2
    Value: !If [CreateNetworking, !Ref PrivateSubnet2, !Ref ExistingPrivateSubnet2Id]
    Export:
      Name: !Sub ${AWS::StackName}-PrivateSubnet2Id
  PrivateSubnet3Id:
    Condition: CreateSG3
    Description: Private subnet in AZ3
    Value: !If [CreateNetworking, !Ref PrivateSubnet3, !Ref ExistingPrivateSubnet3Id]
    Export:
      Name: !Sub ${AWS::StackName}-PrivateSubnet3Id
  PrivateSubnet4Id:
    Condition: CreateSG4
    Description: Private subnet in AZ4
    Value: !If [CreateNetworking, !Ref PrivateSubnet4, !Ref ExistingPrivateSubnet4Id]
    Export:
      Name: !Sub ${AWS::StackName}-PrivateSubnet4Id
  PrivateSubnet5Id:
    Condition: CreateSG5
    Description: Private subnet in AZ5
    Value: !If [CreateNetworking, !Ref PrivateSubnet5, !Ref ExistingPrivateSubnet5Id]
    Export:
      Name: !Sub ${AWS::StackName}-PrivateSubnet5Id
  PrivateSubnet6Id:
    Condition: CreateSG6
    Description: Private subnet in AZ6
    Value: !If [CreateNetworking, !Ref PrivateSubnet6, !Ref ExistingPrivateSubnet6Id]
    Export:
      Name: !Sub ${AWS::StackName}-PrivateSubnet6Id
  PrivateSubnet7Id:
    Condition: CreateSG7
    Description: Private subnet in AZ7
    Value: !If [CreateNetworking, !Ref PrivateSubnet7, !Ref ExistingPrivateSubnet7Id]
    Export:
      Name: !Sub ${AWS::StackName}-PrivateSubnet7Id
  PrivateSubnet8Id:
    Condition: CreateSG8
    Description: Private subnet in AZ8
    Value: !If [CreateNetworking, !Ref PrivateSubnet8, !Ref ExistingPrivateSubnet8Id]
    Export:
      Name: !Sub ${AWS::StackName}-PrivateSubnet8Id
  ServiceGatewaySecGroupId:
    Description: Service Gateway security group ID
    Value: !Ref ServiceGatewaySecGroup
    Export:
      Name: !Sub ${AWS::StackName}-ServiceGatewaySecGroupId
