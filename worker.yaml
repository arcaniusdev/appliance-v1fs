AWSTemplateFormatVersion: "2010-09-09"
Description: "TrendAI File Scanner Worker Application (demo)"

Parameters:
  ScannerStackName:
    Description: Name of the scanner infrastructure stack (for cross-stack imports)
    Type: String
  WorkerInstanceType:
    Description: EC2 instance type for scanner worker fleet
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
  WorkerMinCount:
    Description: Minimum number of scanner workers
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 20
  WorkerMaxCount:
    Description: Maximum number of scanner workers (scales on queue depth)
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 50
  WorkerConcurrency:
    Description: Concurrent scans per worker instance
    Type: Number
    Default: 50
    MinValue: 1
    MaxValue: 200
  RescanAfterDays:
    Description: Re-scan files whose last scan is older than this many days
    Type: Number
    Default: 30
    MinValue: 1
  PMLEnabled:
    Description: Enable Predictive Machine Learning (PML) for scans
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
  SmartFeedbackEnabled:
    Description: Enable Smart Feedback
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
  MaxFileSizeMB:
    Description: Maximum file size in MB for gRPC scanning
    Type: Number
    Default: 500
    MinValue: 10
    MaxValue: 2048

Resources:
  # ── S3 Buckets ──────────────────────────────────────────────────────
  ScanBucket:
    Type: AWS::S3::Bucket
    DependsOn: ScanQueuePolicy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "scan-${AWS::StackName}"
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Queue: !GetAtt ScanQueue.Arn
      Tags:
        - Key: Name
          Value: !Sub ScanBucket-${AWS::StackName}

  QuarantineBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Tags:
        - Key: Name
          Value: !Sub QuarantineBucket-${AWS::StackName}

  # ── SQS ────────────────────────────────────────────────────────────
  ScanQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ScanDLQ.Arn
        maxReceiveCount: 5
      Tags:
        - Key: Name
          Value: !Sub ScanQueue-${AWS::StackName}

  ScanDLQ:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 120
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Name
          Value: !Sub ScanDLQ-${AWS::StackName}

  ScanQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref ScanQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt ScanQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:s3:::scan-${AWS::StackName}"

  # ── Scanner Worker Fleet ────────────────────────────────────────────
  WorkerSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId:
        Fn::ImportValue: !Sub ${ScannerStackName}-VPCId
      GroupDescription: Scanner workers - private subnet, default allow-all egress
      Tags:
        - Key: Name
          Value: !Sub WorkerSecGroup-${AWS::StackName}

  WorkerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: WorkerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ChangeMessageVisibility
                Resource: !GetAtt ScanQueue.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:PutObjectTagging
                Resource: !Sub "${ScanBucket.Arn}/*"
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub "${ScanBucket.Arn}"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectTagging
                Resource: !Sub "${QuarantineBucket.Arn}/*"
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "arn:aws:s3:::${WorkerDeployBucket}/*"
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action: ec2:DescribeInstances
                Resource: "*"
              - Effect: Allow
                Action: autoscaling:CompleteLifecycleAction
                Resource: !Sub "arn:aws:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup:*:autoScalingGroupName/worker-asg-${AWS::StackName}"

  WorkerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref WorkerRole

  WorkerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    DependsOn:
      - WorkerCodeBuild
    Properties:
      LaunchTemplateName: !Sub worker-${AWS::StackName}
      LaunchTemplateData:
        ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
        InstanceType: !Ref WorkerInstanceType
        IamInstanceProfile:
          Arn: !GetAtt WorkerInstanceProfile.Arn
        SecurityGroupIds:
          - !Ref WorkerSecGroup
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 20
              VolumeType: gp3
              Encrypted: true
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub Worker-${AWS::StackName}
        UserData:
          Fn::Base64:
            Fn::Sub:
              - |
                #!/bin/bash
                set -euo pipefail
                exec > /var/log/scanner-bootstrap.log 2>&1

                yum install -y python3.12 python3.12-pip unzip

                mkdir -p /opt/scanner
                aws s3 cp s3://${WorkerDeployBucket}/scanner-app.zip /opt/scanner/scanner-app.zip
                cd /opt/scanner && unzip -o scanner-app.zip
                pip3.12 install -r requirements.txt

                cat > /etc/scanner.env << 'ENVEOF'
                AWS_DEFAULT_REGION=${AWS::Region}
                SQS_QUEUE_URL=${ScanQueue}
                SQS_VISIBILITY_TIMEOUT=300
                MAX_CONCURRENT_SCANS=${WorkerConcurrency}
                ASG_NAME=worker-asg-${AWS::StackName}
                SG_DNS_NAME=sg.scanner.internal
                SG_DISCOVERY_TAG=appliance-v1fs:stack=${ScannerStackName}
                SG_CA_CERT_SECRET_ARN=arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/sg-ca-cert
                V1FS_API_KEY_SECRET_ARN=arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/vision-one-api-key
                AUDIT_LOG_GROUP=scan-audit-${AWS::StackName}
                PML_ENABLED=${PMLEnabled}
                FEEDBACK_ENABLED=${SmartFeedbackEnabled}
                MAX_FILE_SIZE_MB=${MaxFileSizeMB}
                SCANNER_ACCOUNT_ID=${AWS::AccountId}
                QUARANTINE_BUCKET=${QuarantineBucket}
                CUSTOMER_LOG_GROUP=v1fs-scan-audit
                LOG_LEVEL=INFO
                ENVEOF

                cat > /etc/systemd/system/scanner.service << 'SVCEOF'
                [Unit]
                Description=File Scanner Worker
                After=network.target

                [Service]
                EnvironmentFile=/etc/scanner.env
                ExecStart=/usr/bin/python3.12 /opt/scanner/scanner.py
                Restart=always
                RestartSec=5
                KillSignal=SIGTERM
                TimeoutStopSec=330

                [Install]
                WantedBy=multi-user.target
                SVCEOF

                systemctl daemon-reload
                systemctl enable scanner
                systemctl start scanner
              - {}

  WorkerASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn:
      - WorkerCodeBuild
    Properties:
      AutoScalingGroupName: !Sub worker-asg-${AWS::StackName}
      LaunchTemplate:
        LaunchTemplateId: !Ref WorkerLaunchTemplate
        Version: !GetAtt WorkerLaunchTemplate.LatestVersionNumber
      MinSize: !Ref WorkerMinCount
      MaxSize: !Ref WorkerMaxCount
      DesiredCapacity: !Ref WorkerMinCount
      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub ${ScannerStackName}-PrivateSubnet1Id
        - Fn::ImportValue: !Sub ${ScannerStackName}-PrivateSubnet2Id
      HealthCheckType: EC2
      HealthCheckGracePeriod: 180
      DefaultInstanceWarmup: 120
      Tags:
        - Key: Name
          Value: !Sub Worker-${AWS::StackName}
          PropagateAtLaunch: false

  WorkerTerminationHook:
    Type: AWS::AutoScaling::LifecycleHook
    Properties:
      LifecycleHookName: WorkerTerminationHook
      AutoScalingGroupName: !Ref WorkerASG
      LifecycleTransition: autoscaling:EC2_INSTANCE_TERMINATING
      HeartbeatTimeout: 330
      DefaultResult: CONTINUE

  WorkerScaleOutPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerASG
      PolicyType: StepScaling
      AdjustmentType: ChangeInCapacity
      EstimatedInstanceWarmup: 120
      StepAdjustments:
        - MetricIntervalLowerBound: 0
          MetricIntervalUpperBound: 1000
          ScalingAdjustment: 1
        - MetricIntervalLowerBound: 1000
          MetricIntervalUpperBound: 5000
          ScalingAdjustment: 2
        - MetricIntervalLowerBound: 5000
          ScalingAdjustment: 4

  WorkerScaleOutAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-worker-scale-out
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 100
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScanQueue.QueueName
      AlarmActions:
        - !Ref WorkerScaleOutPolicy

  WorkerScaleInPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerASG
      PolicyType: StepScaling
      AdjustmentType: ChangeInCapacity
      EstimatedInstanceWarmup: 300
      StepAdjustments:
        - MetricIntervalUpperBound: 0
          ScalingAdjustment: -1

  WorkerScaleInAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-worker-scale-in
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 10
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScanQueue.QueueName
      AlarmActions:
        - !Ref WorkerScaleInPolicy

  # ── Code Build ────────────────────────────────────────────────────
  WorkerDeployBucket:
    Type: AWS::S3::Bucket
    Properties:
      Tags:
        - Key: Name
          Value: !Sub WorkerDeployBucket-${AWS::StackName}

  WorkerCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${WorkerDeployBucket}/*"

  WorkerCodeBuildProject:
    Type: AWS::CodeBuild::Project
    DependsOn: WorkerDeployBucket
    Properties:
      Name: !Sub appliance-v1fs-worker-build-${AWS::StackName}
      ServiceRole: !GetAtt WorkerCodeBuildRole.Arn
      TimeoutInMinutes: 15
      Environment:
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        Type: LINUX_CONTAINER
        EnvironmentVariables:
          - Name: DEPLOY_BUCKET
            Value: !Ref WorkerDeployBucket
      Source:
        Type: GITHUB
        Location: https://github.com/arcaniusdev/appliance-v1fs.git
        BuildSpec: buildspec-worker.yml
      Artifacts:
        Type: NO_ARTIFACTS

  WorkerCodeBuildTriggerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TriggerBuild
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt WorkerCodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:DeleteObject
                  - s3:ListBucketVersions
                  - s3:DeleteObjectVersion
                Resource:
                  - !GetAtt WorkerDeployBucket.Arn
                  - !Sub "${WorkerDeployBucket.Arn}/*"

  WorkerCodeBuildTrigger:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub worker-build-trigger-${AWS::StackName}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt WorkerCodeBuildTriggerRole.Arn
      Timeout: 900
      Code:
        ZipFile: |
          import boto3, json, time, urllib.request

          def handler(event, context):
              cb = boto3.client("codebuild")
              props = event.get("ResourceProperties", {})
              project = props["ProjectName"]

              if event["RequestType"] == "Delete":
                  bucket = props.get("DeployBucket", "")
                  if bucket:
                      s3 = boto3.client("s3")
                      try:
                          while True:
                              objs = s3.list_object_versions(Bucket=bucket, MaxKeys=1000)
                              to_delete = [{"Key": o["Key"], "VersionId": o["VersionId"]} for o in objs.get("Versions", [])]
                              to_delete += [{"Key": o["Key"], "VersionId": o["VersionId"]} for o in objs.get("DeleteMarkers", [])]
                              if not to_delete:
                                  break
                              s3.delete_objects(Bucket=bucket, Delete={"Objects": to_delete})
                      except Exception as e:
                          print(f"Bucket cleanup warning: {e}")
                  return send(event, context, "SUCCESS", {})

              try:
                  resp = cb.start_build(projectName=project)
                  build_id = resp["build"]["id"]
                  while True:
                      time.sleep(15)
                      builds = cb.batch_get_builds(ids=[build_id])["builds"]
                      status = builds[0]["buildStatus"]
                      if status == "SUCCEEDED":
                          return send(event, context, "SUCCESS", {"BuildId": build_id})
                      if status in ("FAILED", "FAULT", "STOPPED", "TIMED_OUT"):
                          return send(event, context, "FAILED", {}, f"Build {status}: {build_id}")
                      remaining = context.get_remaining_time_in_millis()
                      if remaining < 30000:
                          return send(event, context, "FAILED", {}, "Lambda timeout waiting for build")
              except Exception as e:
                  return send(event, context, "FAILED", {}, str(e))

          def send(event, context, status, data, reason=""):
              body = json.dumps({
                  "Status": status,
                  "Reason": reason or f"See CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data,
              }).encode()
              req = urllib.request.Request(event["ResponseURL"], data=body, method="PUT")
              req.add_header("Content-Type", "")
              req.add_header("Content-Length", str(len(body)))
              urllib.request.urlopen(req)

  WorkerCodeBuild:
    Type: Custom::CodeBuild
    DependsOn: WorkerDeployBucket
    Properties:
      ServiceToken: !GetAtt WorkerCodeBuildTrigger.Arn
      ProjectName: !Ref WorkerCodeBuildProject
      DeployBucket: !Ref WorkerDeployBucket

  # ── CloudWatch Audit Log ───────────────────────────────────────────
  AuditLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub scan-audit-${AWS::StackName}
      RetentionInDays: 90

  # ── Alarms & Notifications ─────────────────────────────────────────
  AlarmSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub scan-alarms-${AWS::StackName}
      Tags:
        - Key: Name
          Value: !Sub AlarmSNSTopic-${AWS::StackName}

  DLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-dlq-messages
      AlarmDescription: Messages in the dead-letter queue indicate scan failures after 3 retries
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScanDLQ.QueueName
      AlarmActions:
        - !Ref AlarmSNSTopic
      OKActions:
        - !Ref AlarmSNSTopic

  QueueAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-queue-age
      AlarmDescription: Oldest message age exceeds 20 minutes for 5 consecutive minutes — scanner may be stuck or unable to keep up
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 5
      Threshold: 1200
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScanQueue.QueueName
      AlarmActions:
        - !Ref AlarmSNSTopic
      OKActions:
        - !Ref AlarmSNSTopic

  QueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-queue-depth
      AlarmDescription: Queue depth exceeds 10,000 messages for 5 consecutive minutes — scanners may be down or overwhelmed
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 5
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScanQueue.QueueName
      AlarmActions:
        - !Ref AlarmSNSTopic
      OKActions:
        - !Ref AlarmSNSTopic

  # ── CloudWatch Dashboard ─────────────────────────────────────────
  ScannerDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub scanner-${AWS::StackName}
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0, "y": 0, "width": 24, "height": 1,
              "properties": {
                "markdown": "# Scanner Pipeline — ${AWS::StackName}"
              }
            },
            {
              "type": "alarm",
              "x": 0, "y": 1, "width": 6, "height": 3,
              "properties": {
                "title": "Alarm Status",
                "alarms": [
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${AWS::StackName}-dlq-messages",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${AWS::StackName}-queue-age",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${AWS::StackName}-queue-depth"
                ]
              }
            },
            {
              "type": "log",
              "x": 6, "y": 1, "width": 3, "height": 3,
              "properties": {
                "query": "SOURCE 'scan-audit-${AWS::StackName}' | stats count(*) as Scans",
                "region": "${AWS::Region}",
                "title": "Scans (1h)",
                "view": "singleValue"
              }
            },
            {
              "type": "metric",
              "x": 9, "y": 1, "width": 3, "height": 3,
              "properties": {
                "metrics": [["AWS/SQS", "NumberOfMessagesDeleted", "QueueName", "${ScanQueue.QueueName}", {"stat": "Sum", "label": "Scans/min"}]],
                "view": "singleValue",
                "region": "${AWS::Region}",
                "title": "Scan Rate",
                "period": 60,
                "sparkline": true
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 1, "width": 3, "height": 3,
              "properties": {
                "metrics": [["AWS/SQS", "ApproximateAgeOfOldestMessage", "QueueName", "${ScanQueue.QueueName}", {"stat": "Maximum", "color": "#ff7f0e", "label": "Queue Age"}]],
                "view": "singleValue",
                "region": "${AWS::Region}",
                "title": "Queue Age (s)",
                "period": 60,
                "sparkline": true
              }
            },
            {
              "type": "metric",
              "x": 15, "y": 1, "width": 3, "height": 3,
              "properties": {
                "metrics": [["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "${ScanQueue.QueueName}", {"stat": "Maximum", "label": "Queued"}]],
                "view": "singleValue",
                "region": "${AWS::Region}",
                "title": "Queued",
                "period": 60,
                "sparkline": true
              }
            },
            {
              "type": "metric",
              "x": 18, "y": 1, "width": 3, "height": 3,
              "properties": {
                "metrics": [["AWS/SQS", "ApproximateNumberOfMessagesNotVisible", "QueueName", "${ScanQueue.QueueName}", {"stat": "Maximum", "color": "#9467bd", "label": "In Flight"}]],
                "view": "singleValue",
                "region": "${AWS::Region}",
                "title": "In Flight",
                "period": 60,
                "sparkline": true
              }
            },
            {
              "type": "metric",
              "x": 21, "y": 1, "width": 3, "height": 3,
              "properties": {
                "metrics": [["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "${ScanDLQ.QueueName}", {"stat": "Maximum", "color": "#d62728", "label": "DLQ Messages"}]],
                "view": "singleValue",
                "region": "${AWS::Region}",
                "title": "DLQ",
                "period": 60,
                "sparkline": true
              }
            },
            {
              "type": "text",
              "x": 0, "y": 4, "width": 24, "height": 1,
              "properties": { "markdown": "## Queue Health" }
            },
            {
              "type": "metric",
              "x": 0, "y": 5, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/SQS", "NumberOfMessagesSent", "QueueName", "${ScanQueue.QueueName}", {"stat": "Sum", "color": "#1f77b4", "label": "Sent (ingested)"}],
                  ["AWS/SQS", "NumberOfMessagesReceived", "QueueName", "${ScanQueue.QueueName}", {"stat": "Sum", "color": "#ff7f0e", "label": "Received (picked up)"}],
                  ["AWS/SQS", "NumberOfMessagesDeleted", "QueueName", "${ScanQueue.QueueName}", {"stat": "Sum", "color": "#2ca02c", "label": "Deleted (completed)"}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Message Flow",
                "period": 60,
                "yAxis": { "left": { "label": "Messages", "showUnits": false } }
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 5, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "${ScanQueue.QueueName}", {"stat": "Maximum", "color": "#1f77b4", "label": "Visible"}],
                  ["AWS/SQS", "ApproximateNumberOfMessagesNotVisible", "QueueName", "${ScanQueue.QueueName}", {"stat": "Maximum", "color": "#9467bd", "label": "In Flight"}],
                  ["AWS/SQS", "ApproximateAgeOfOldestMessage", "QueueName", "${ScanQueue.QueueName}", {"stat": "Maximum", "color": "#d62728", "label": "Age (s)", "yAxis": "right"}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Queue Depth & Message Age",
                "period": 60,
                "yAxis": { "left": { "label": "Messages", "showUnits": false }, "right": { "label": "Seconds", "showUnits": false } }
              }
            },
            {
              "type": "text",
              "x": 0, "y": 11, "width": 24, "height": 1,
              "properties": { "markdown": "## Scan Performance" }
            },
            {
