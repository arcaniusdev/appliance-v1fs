                "region": "${AWS::Region}",
                "title": "File Size (KB) — avg / p90 / max",
                "view": "timeSeries"
              }
            },
            {
              "type": "text",
              "x": 0, "y": 39, "width": 24, "height": 1,
              "properties": { "markdown": "## DLQ" }
            },
            {
              "type": "metric",
              "x": 0, "y": 40, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "${ScanDLQ.QueueName}", {"stat": "Maximum", "color": "#d62728", "label": "DLQ Depth"}],
                  ["AWS/SQS", "NumberOfMessagesSent", "QueueName", "${ScanDLQ.QueueName}", {"stat": "Sum", "color": "#ff7f0e", "label": "Messages Arriving"}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Dead Letter Queue",
                "period": 60,
                "yAxis": { "left": { "label": "Messages", "showUnits": false } }
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 40, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/SQS", "NumberOfMessagesSent", "QueueName", "${ScanDLQ.QueueName}", {"stat": "Sum", "color": "#d62728", "label": "Failures to DLQ"}],
                  ["AWS/SQS", "NumberOfMessagesDeleted", "QueueName", "${ScanQueue.QueueName}", {"stat": "Sum", "color": "#2ca02c", "label": "Successful Scans"}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Success vs Failure Rate",
                "period": 60,
                "yAxis": { "left": { "label": "Count", "showUnits": false } }
              }
            },
            {
              "type": "text",
              "x": 0, "y": 53, "width": 24, "height": 1,
              "properties": { "markdown": "## Cross-Account" }
            },
            {
              "type": "log",
              "x": 0, "y": 54, "width": 12, "height": 6,
              "properties": {
                "query": "SOURCE 'scan-audit-${AWS::StackName}' | stats count(*) as scans by sourceAccount | sort scans desc",
                "region": "${AWS::Region}",
                "title": "Scans by Source Account",
                "view": "bar"
              }
            },
            {
              "type": "log",
              "x": 12, "y": 54, "width": 12, "height": 6,
              "properties": {
                "query": "SOURCE 'scan-audit-${AWS::StackName}' | filter verdict = 'malicious' | stats count(*) as detections by sourceAccount | sort detections desc",
                "region": "${AWS::Region}",
                "title": "Detections by Source Account",
                "view": "bar"
              }
            },
            {
              "type": "text",
              "x": 0, "y": 60, "width": 24, "height": 1,
              "properties": { "markdown": "## Recent Scans" }
            },
            {
              "type": "log",
              "x": 0, "y": 61, "width": 24, "height": 6,
              "properties": {
                "query": "SOURCE 'scan-audit-${AWS::StackName}' | fields @timestamp, sourceAccount, bucket, file, verdict, malware.0 as malware_name, scanDurationMs as duration_ms, size, sha256, serviceGateway | sort @timestamp desc | limit 100",
                "region": "${AWS::Region}",
                "title": "Latest Scan Results",
                "view": "table"
              }
            }
          ]
        }

  # ── Provisioner Lambda ──────────────────────────────────────────────
  ProvisionerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ProvisionerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/ec2/keypair/*"
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:PutSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/*"
              - Effect: Allow
                Action:
                  - ec2-instance-connect:OpenTunnel
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceConnectEndpoints
                  - ec2:CreateTags
                Resource: "*"
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/appliance-v1fs/*"
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/*"
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "arn:aws:s3:::${DeployBucket}/awscli-runtime.zip"
              - Effect: Allow
                Action:
                  - autoscaling:CompleteLifecycleAction
                  - autoscaling:UpdateAutoScalingGroup
                  - autoscaling:DescribeAutoScalingGroups
                Resource: !Sub "arn:aws:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup:*:autoScalingGroupName/sg-asg-${AWS::StackName}"

  ProvisionerLambda:
    Type: AWS::Lambda::Function
    DependsOn: CodeBuild
    Properties:
      FunctionName: !Sub provisioner-${AWS::StackName}
      Runtime: python3.12
      Handler: handler.handler
      Code:
        S3Bucket: !Ref DeployBucket
        S3Key: provisioner-code.zip
      Layers:
        - !Ref ProvisionerLayer
      Role: !GetAtt ProvisionerLambdaRole.Arn
      Timeout: 900
      MemorySize: 256
      Environment:
        Variables:
          SG_TAG_KEY: "appliance-v1fs:stack"
          SG_TAG_VALUE: !Ref "AWS::StackName"
          EICE_ENDPOINT_ID: !Ref EICEndpoint
          KEY_PAIR_ID: !GetAtt ServiceGatewayKeyPair.KeyPairId
          CERT_SECRET_NAME: appliance-v1fs/sg-ca-cert
          REGISTRATION_TOKEN_SECRET: appliance-v1fs/sg-registration-token
          AWS_REGION_NAME: !Ref "AWS::Region"
          DEPLOY_BUCKET: !Ref DeployBucket
          MAX_FILE_SIZE_MB: !Ref MaxFileSizeMB
          SG_ASG_NAME: !Sub sg-asg-${AWS::StackName}
          SG_MIN_COUNT: !Ref ServiceGatewayMinCount

  WatchdogSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub watchdog-${AWS::StackName}
      Description: Check SG scanner versions and re-apply customizations if updated
      ScheduleExpression: rate(15 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt ProvisionerLambda.Arn
          Id: WatchdogTarget
          Input: '{"action": "watchdog"}'

  WatchdogPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProvisionerLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WatchdogSchedule.Arn

  # ── EC2 Instance Connect Endpoint ──────────────────────────────────
  EICSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref BaseVPC
      GroupDescription: EC2 Instance Connect Endpoint
      Tags:
        - Key: Name
          Value: !Sub EICSecGroup-${AWS::StackName}

  EICEndpoint:
    Type: AWS::EC2::InstanceConnectEndpoint
    Properties:
      SubnetId: !Ref PrivateSubnet1
      SecurityGroupIds:
        - !Ref EICSecGroup
      PreserveClientIp: false
      Tags:
        - Key: Name
          Value: !Sub EICEndpoint-${AWS::StackName}

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref BaseVPC
  PublicSubnet1Id:
    Description: Public subnet 1
    Value: !Ref PublicSubnet1
  PublicSubnet2Id:
    Description: Public subnet 2
    Value: !Ref PublicSubnet2
  PrivateSubnet1Id:
    Description: Private subnet 1
    Value: !Ref PrivateSubnet1
  PrivateSubnet2Id:
    Description: Private subnet 2
    Value: !Ref PrivateSubnet2
  ServiceGatewayASGName:
    Description: Service Gateway Auto Scaling Group
    Value: !Ref ServiceGatewayASG
  SourceBucketName:
    Description: S3 source bucket (files arrive here, malware access denied via bucket policy)
    Value: !Ref SourceBucket
  ScanBucketName:
    Description: S3 scan bucket (replicated from source, EventBridge triggers scanning)
    Value: !Ref ScanBucket
  ScanEventRuleArn:
    Description: "EventBridge rule ARN — to enroll another bucket, enable EventBridge notifications on it: aws s3api put-bucket-notification-configuration --bucket BUCKET --notification-configuration '{\"EventBridgeConfiguration\":{}}'"
    Value: !GetAtt ScanEventRule.Arn
  ScanQueueUrl:
    Description: SQS scan queue URL
    Value: !Ref ScanQueue
  ScanDLQUrl:
    Description: SQS dead letter queue URL
    Value: !Ref ScanDLQ
  WorkerASGName:
    Description: Scanner worker Auto Scaling Group name
    Value: !Ref WorkerASG
  DashboardURL:
    Description: CloudWatch dashboard URL
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards/dashboard/scanner-${AWS::StackName}"
  AlarmSNSTopicArn:
    Description: SNS topic for alarm notifications
    Value: !Ref AlarmSNSTopic
  AuditLogGroupName:
    Description: CloudWatch log group for scan audit trail
    Value: !Ref AuditLogGroup
  QuarantineBucketName:
    Description: Central quarantine bucket for malicious files
    Value: !Ref QuarantineBucket
  ALBDNSName:
    Description: Scanner ALB DNS name (internal gRPC endpoint)
    Value: !GetAtt ScannerALB.DNSName
  WorkerRoleArn:
    Description: Scanner worker role ARN (for enrollment template trust policy)
    Value: !GetAtt WorkerRole.Arn
  ScannerAccountId:
    Description: Scanner account ID (for enrollment template parameter)
    Value: !Ref "AWS::AccountId"
  EnrollmentTemplateURL:
    Description: Pre-populated enrollment template — download and deploy in customer accounts
    Value: !GetAtt EnrollmentTemplateResource.TemplateURL
