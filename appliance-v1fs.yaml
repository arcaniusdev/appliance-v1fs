  # ── Provisioner Lambda ──────────────────────────────────────────────
  ProvisionerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ProvisionerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/ec2/keypair/*"
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:PutSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/*"
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"
              - Effect: Allow
                Action:
                  - ec2-instance-connect:OpenTunnel
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceConnectEndpoints
                Resource: "*"
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/appliance-v1fs/*"

  ProvisionerLambda:
    Type: AWS::Lambda::Function
    DependsOn: ImageBuild
    Properties:
      FunctionName: !Sub provisioner-${AWS::StackName}
      PackageType: Image
      Code:
        ImageUri: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${AWS::StackName}-provisioner:latest"
      Role: !GetAtt ProvisionerLambdaRole.Arn
      Timeout: 900
      MemorySize: 256
      Environment:
        Variables:
          SG_INSTANCES: !If
            - DeploySG3
            - !Sub '["${ServiceGateway1}", "${ServiceGateway2}", "${ServiceGateway3}"]'
            - !If
              - DeploySG2
              - !Sub '["${ServiceGateway1}", "${ServiceGateway2}"]'
              - !Sub '["${ServiceGateway1}"]'
          EICE_ENDPOINT_ID: !Ref EICEndpoint
          KEY_PAIR_ID: !GetAtt ServiceGatewayKeyPair.KeyPairId
          CERT_SECRET_NAME: appliance-v1fs/sg-ca-cert
          AWS_REGION_NAME: !Ref "AWS::Region"

  WatchdogSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub watchdog-${AWS::StackName}
      Description: Check SG scanner versions and re-apply customizations if updated
      ScheduleExpression: rate(15 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt ProvisionerLambda.Arn
          Id: WatchdogTarget
          Input: '{"action": "watchdog"}'

  WatchdogPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProvisionerLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WatchdogSchedule.Arn

  # ── Custom Resources: Registration & Scanner Detection ─────────────
  # ── Custom Resources: SG1 (always) ──────────────────────────────────
  SGRegistration1:
    Type: Custom::SGRegistration
    DependsOn:
      - ServiceGateway1
      - EICEndpoint
    Properties:
      ServiceToken: !GetAtt ProvisionerLambda.Arn
      Action: register
      InstanceId: !Ref ServiceGateway1
      EndpointId: !Ref EICEndpoint
      RegistrationToken: !Ref RegistrationToken
      Hostname: !Sub "${ServiceGatewayHostname}-01"
      KeyPairId: !GetAtt ServiceGatewayKeyPair.KeyPairId
      Region: !Ref "AWS::Region"

  SGWaitForScanner1:
    Type: Custom::SGWaitForScanner
    DependsOn: SGRegistration1
    Properties:
      ServiceToken: !GetAtt ProvisionerLambda.Arn
      Action: wait-for-scanner
      InstanceId: !Ref ServiceGateway1
      EndpointId: !Ref EICEndpoint
      ServiceGatewayIP: !GetAtt ServiceGateway1.PrivateIp
      KeyPairId: !GetAtt ServiceGatewayKeyPair.KeyPairId
      CACertSecretName: appliance-v1fs/sg-ca-cert
      Region: !Ref "AWS::Region"

  # ── Custom Resources: SG2 (conditional) ────────────────────────────
  SGRegistration2:
    Type: Custom::SGRegistration
    Condition: DeploySG2
    DependsOn:
      - ServiceGateway2
      - EICEndpoint
    Properties:
      ServiceToken: !GetAtt ProvisionerLambda.Arn
      Action: register
      InstanceId: !Ref ServiceGateway2
      EndpointId: !Ref EICEndpoint
      RegistrationToken: !Ref RegistrationToken
      Hostname: !Sub "${ServiceGatewayHostname}-02"
      KeyPairId: !GetAtt ServiceGatewayKeyPair.KeyPairId
      Region: !Ref "AWS::Region"

  SGWaitForScanner2:
    Type: Custom::SGWaitForScanner
    Condition: DeploySG2
    DependsOn: SGRegistration2
    Properties:
      ServiceToken: !GetAtt ProvisionerLambda.Arn
      Action: wait-for-scanner
      InstanceId: !Ref ServiceGateway2
      EndpointId: !Ref EICEndpoint
      ServiceGatewayIP: !GetAtt ServiceGateway2.PrivateIp
      KeyPairId: !GetAtt ServiceGatewayKeyPair.KeyPairId
      CACertSecretName: appliance-v1fs/sg-ca-cert
      Region: !Ref "AWS::Region"

  # ── Custom Resources: SG3 (conditional) ────────────────────────────
  SGRegistration3:
    Type: Custom::SGRegistration
    Condition: DeploySG3
    DependsOn:
      - ServiceGateway3
      - EICEndpoint
    Properties:
      ServiceToken: !GetAtt ProvisionerLambda.Arn
      Action: register
      InstanceId: !Ref ServiceGateway3
      EndpointId: !Ref EICEndpoint
      RegistrationToken: !Ref RegistrationToken
      Hostname: !Sub "${ServiceGatewayHostname}-03"
      KeyPairId: !GetAtt ServiceGatewayKeyPair.KeyPairId
      Region: !Ref "AWS::Region"

  SGWaitForScanner3:
    Type: Custom::SGWaitForScanner
    Condition: DeploySG3
    DependsOn: SGRegistration3
    Properties:
      ServiceToken: !GetAtt ProvisionerLambda.Arn
      Action: wait-for-scanner
      InstanceId: !Ref ServiceGateway3
      EndpointId: !Ref EICEndpoint
      ServiceGatewayIP: !GetAtt ServiceGateway3.PrivateIp
      KeyPairId: !GetAtt ServiceGatewayKeyPair.KeyPairId
      CACertSecretName: appliance-v1fs/sg-ca-cert
      Region: !Ref "AWS::Region"

  # ── EC2 Instance Connect Endpoint ──────────────────────────────────
  EICSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref BaseVPC
      GroupDescription: EC2 Instance Connect Endpoint
      Tags:
        - Key: Name
          Value: !Sub EICSecGroup-${AWS::StackName}

  EICEndpoint:
    Type: AWS::EC2::InstanceConnectEndpoint
    Properties:
      SubnetId: !Ref PrivateSubnet1
      SecurityGroupIds:
        - !Ref EICSecGroup
      PreserveClientIp: false
      Tags:
        - Key: Name
          Value: !Sub EICEndpoint-${AWS::StackName}

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref BaseVPC
  PublicSubnet1Id:
    Description: Public subnet 1
    Value: !Ref PublicSubnet1
  PublicSubnet2Id:
    Description: Public subnet 2
    Value: !Ref PublicSubnet2
  PrivateSubnet1Id:
    Description: Private subnet 1
    Value: !Ref PrivateSubnet1
  PrivateSubnet2Id:
    Description: Private subnet 2
    Value: !Ref PrivateSubnet2
  ServiceGateway1Id:
    Description: Service Gateway 1 instance ID
    Value: !Ref ServiceGateway1
  ServiceGateway1PrivateIP:
    Description: Service Gateway 1 private IP
    Value: !GetAtt ServiceGateway1.PrivateIp
  ServiceGateway2Id:
    Condition: DeploySG2
    Description: Service Gateway 2 instance ID
    Value: !Ref ServiceGateway2
  ServiceGateway2PrivateIP:
    Condition: DeploySG2
    Description: Service Gateway 2 private IP
    Value: !GetAtt ServiceGateway2.PrivateIp
  ServiceGateway3Id:
    Condition: DeploySG3
    Description: Service Gateway 3 instance ID
    Value: !Ref ServiceGateway3
  ServiceGateway3PrivateIP:
    Condition: DeploySG3
    Description: Service Gateway 3 private IP
    Value: !GetAtt ServiceGateway3.PrivateIp
  IngestBucketName:
    Description: S3 ingest bucket
    Value: !Ref IngestBucket
  CleanBucketName:
    Description: S3 clean bucket
    Value: !Ref CleanBucket
  QuarantineBucketName:
    Description: S3 quarantine bucket
    Value: !Ref QuarantineBucket
  ScanQueueUrl:
    Description: SQS scan queue URL
    Value: !Ref ScanQueue
  ScanDLQUrl:
    Description: SQS dead letter queue URL
    Value: !Ref ScanDLQ
  ScannerLambdaName:
    Description: Scanner Lambda function name
    Value: !Ref ScannerLambda
  DashboardURL:
    Description: CloudWatch dashboard URL
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards/dashboard/scanner-${AWS::StackName}"
  AlarmSNSTopicArn:
    Description: SNS topic for alarm notifications
    Value: !Ref AlarmSNSTopic
  AuditLogGroupName:
    Description: CloudWatch log group for scan audit trail
    Value: !Ref AuditLogGroup
  MountPointServer:
    Description: "NFS mount target IP for Vision One mount point configuration (Server IP) — use the IP in the same AZ as the Service Gateway"
    Value: !GetAtt EFSMountTarget1.IpAddress
  MountPointPath:
    Description: "NFS folder path for Vision One mount point configuration (Server folder path)"
    Value: /scan-inbox
  MountPointQuarantine:
    Description: "Quarantine folder path for Vision One mount point configuration"
    Value: /scan-inbox/quarantine
