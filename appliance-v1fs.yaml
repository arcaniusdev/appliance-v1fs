AWSTemplateFormatVersion: "2010-09-09"
Description: TrendAI Service Gateway File Scanner - Network Infrastructure

Mappings:
  ServiceGatewayAMI:
    ap-northeast-1:
      AMI: ami-061b8e13afe1358d6
    ap-northeast-2:
      AMI: ami-06d290f555649e7cf
    ap-northeast-3:
      AMI: ami-00f25d39db251653f
    ap-south-1:
      AMI: ami-0a2f9a344b741d105
    ap-southeast-1:
      AMI: ami-0314c89685371c51b
    ap-southeast-2:
      AMI: ami-041754942552affa3
    ca-central-1:
      AMI: ami-07402a3cb195e17fc
    eu-central-1:
      AMI: ami-052395dc73896c7e9
    eu-north-1:
      AMI: ami-01da7559532215e43
    eu-west-1:
      AMI: ami-0464d17a390eaa185
    eu-west-2:
      AMI: ami-074a722115304208d
    eu-west-3:
      AMI: ami-0fb56479bb67150e8
    sa-east-1:
      AMI: ami-0fceef1ddaea68074
    us-east-1:
      AMI: ami-0cc07c329eab4df1c
    us-east-2:
      AMI: ami-070f04f9bc3eea5f5
    us-west-1:
      AMI: ami-0d82ee727bafa15e8
    us-west-2:
      AMI: ami-0bcbbe1b09927f3d7

Parameters:
  PrimaryAZ:
    Description: Availability Zone 1
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1a
  SecondaryAZ:
    Description: Availability Zone 2
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1b
  RegistrationToken:
    Description: TrendAI Vision One Service Gateway registration token
    Type: String
    NoEcho: true
    MinLength: 1
  ServiceGatewayHostname:
    Description: Hostname prefix for Service Gateway appliances (numbered automatically)
    Type: String
    Default: FSVA-AWS
  NumberOfServiceGateways:
    Description: Number of Service Gateway appliances to deploy (1-3)
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 3
  PMLEnabled:
    Description: Enable Predictive Machine Learning (PML) for scans
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  SmartFeedbackEnabled:
    Description: Enable Smart Feedback (scan telemetry sent to TrendAI for threat intelligence)
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  ServiceGatewayInstanceType:
    Description: EC2 instance type for Service Gateway appliances
    Type: String
    Default: c5.4xlarge
    AllowedValues:
      - c5.2xlarge
      - c5.4xlarge
  ChannelsPerSG:
    Description: Number of gRPC channels per Service Gateway (higher = more concurrent scans)
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 8

Conditions:
  DeploySG2: !Not [!Equals [!Ref NumberOfServiceGateways, 1]]
  DeploySG3: !Equals [!Ref NumberOfServiceGateways, 3]

Resources:
  # ── VPC ──────────────────────────────────────────────────────────────
  BaseVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.2.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Sub BaseVPC-${AWS::StackName}

  # ── Internet Gateway ────────────────────────────────────────────────
  IG:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub IG-${AWS::StackName}

  VPCIG:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref IG
      VpcId: !Ref BaseVPC

  # ── Public Subnets ──────────────────────────────────────────────────
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.0.0/22
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref PrimaryAZ
      Tags:
        - Key: Name
          Value: !Sub PublicSubnet1-${AWS::StackName}

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.4.0/22
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref SecondaryAZ
      Tags:
        - Key: Name
          Value: !Sub PublicSubnet2-${AWS::StackName}

  # ── Private Subnets ─────────────────────────────────────────────────
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.32.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref PrimaryAZ
      Tags:
        - Key: Name
          Value: !Sub PrivateSubnet1-${AWS::StackName}

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.48.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref SecondaryAZ
      Tags:
        - Key: Name
          Value: !Sub PrivateSubnet2-${AWS::StackName}

  # ── NAT Gateway EIPs ────────────────────────────────────────────────
  NGWEIP1:
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP1-${AWS::StackName}

  NGWEIP2:
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP2-${AWS::StackName}

  # ── NAT Gateways ────────────────────────────────────────────────────
  NGW1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP1.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub NGW1-${AWS::StackName}

  NGW2:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP2.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub NGW2-${AWS::StackName}

  # ── Public Route Tables ─────────────────────────────────────────────
  PublicRT1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT1-${AWS::StackName}

  PublicRoute1:
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT1
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  PublicRT2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT2-${AWS::StackName}

  PublicRoute2:
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT2
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  # ── Private Route Tables ────────────────────────────────────────────
  PrivateRT1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PrivateRT1-${AWS::StackName}

  PrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRT1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NGW1

  PrivateRT2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PrivateRT2-${AWS::StackName}

  PrivateRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRT2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NGW2

  # ── Route Table Associations ────────────────────────────────────────
  PublicSubnetRT1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRT1
      SubnetId: !Ref PublicSubnet1

  PublicSubnetRT2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRT2
      SubnetId: !Ref PublicSubnet2

  PrivateSubnetRT1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRT1
      SubnetId: !Ref PrivateSubnet1

  PrivateSubnetRT2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRT2
      SubnetId: !Ref PrivateSubnet2

  # ── SSH Key Pair ────────────────────────────────────────────────────
  ServiceGatewayKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub ServiceGatewayKeyPair-${AWS::StackName}
      KeyType: ed25519
      Tags:
        - Key: Name
          Value: !Sub ServiceGatewayKeyPair-${AWS::StackName}

  # ── Service Gateway ────────────────────────────────────────────────
  ServiceGatewaySecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref BaseVPC
      GroupDescription: Service Gateway appliance - inbound scan traffic and management
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.2.0.0/16
          Description: HTTPS from VPC (SDK gRPC, management)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 10.2.0.0/16
          Description: SSH from VPC (CLI management)
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 10.2.0.0/16
          Description: NFS to EFS (mount point scanning)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS outbound (Vision One, updates)
      Tags:
        - Key: Name
          Value: !Sub ServiceGatewaySecGroup-${AWS::StackName}

  ServiceGateway1:
    Type: AWS::EC2::Instance
    DependsOn: PrivateRoute1
    Properties:
      ImageId: !FindInMap [ServiceGatewayAMI, !Ref "AWS::Region", AMI]
      InstanceType: !Ref ServiceGatewayInstanceType
      KeyName: !Ref ServiceGatewayKeyPair
      SubnetId: !Ref PrivateSubnet1
      SecurityGroupIds:
        - !Ref ServiceGatewaySecGroup
      Tags:
        - Key: Name
          Value: !Sub ServiceGateway1-${AWS::StackName}

  ServiceGateway2:
    Type: AWS::EC2::Instance
    Condition: DeploySG2
    DependsOn: PrivateRoute2
    Properties:
      ImageId: !FindInMap [ServiceGatewayAMI, !Ref "AWS::Region", AMI]
      InstanceType: !Ref ServiceGatewayInstanceType
      KeyName: !Ref ServiceGatewayKeyPair
      SubnetId: !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref ServiceGatewaySecGroup
      Tags:
        - Key: Name
          Value: !Sub ServiceGateway2-${AWS::StackName}

  ServiceGateway3:
    Type: AWS::EC2::Instance
    Condition: DeploySG3
    DependsOn: PrivateRoute1
    Properties:
      ImageId: !FindInMap [ServiceGatewayAMI, !Ref "AWS::Region", AMI]
      InstanceType: !Ref ServiceGatewayInstanceType
      KeyName: !Ref ServiceGatewayKeyPair
      SubnetId: !Ref PrivateSubnet1
      SecurityGroupIds:
        - !Ref ServiceGatewaySecGroup
      Tags:
        - Key: Name
          Value: !Sub ServiceGateway3-${AWS::StackName}

  # ── ECR Repository (Provisioner only) ───────────────────────────────
  ProvisionerECRRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${AWS::StackName}-provisioner
      EmptyOnDelete: true
      ImageScanningConfiguration:
        ScanOnPush: true

  # ── Image Build (CodeBuild) ───────────────────────────────────────
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource:
                  - !GetAtt ProvisionerECRRepo.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${DeployBucket}/*"

  DeployBucket:
    Type: AWS::S3::Bucket
    Properties:
      Tags:
        - Key: Name
          Value: !Sub DeployBucket-${AWS::StackName}

  ImageBuildProject:
    Type: AWS::CodeBuild::Project
    DependsOn:
      - ProvisionerECRRepo
      - DeployBucket
    Properties:
      Name: !Sub appliance-v1fs-build-${AWS::StackName}
      ServiceRole: !GetAtt CodeBuildRole.Arn
      TimeoutInMinutes: 15
      Environment:
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        Type: LINUX_CONTAINER
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_ACCOUNT_ID
            Value: !Ref "AWS::AccountId"
          - Name: AWS_DEFAULT_REGION
            Value: !Ref "AWS::Region"
          - Name: PROVISIONER_REPO
            Value: !Sub ${AWS::StackName}-provisioner
          - Name: DEPLOY_BUCKET
            Value: !Ref DeployBucket
      Source:
        Type: GITHUB
        Location: https://github.com/arcaniusdev/appliance-v1fs.git
        BuildSpec: buildspec.yml
      Artifacts:
        Type: NO_ARTIFACTS

  ImageBuildTriggerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TriggerBuild
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt ImageBuildProject.Arn

  ImageBuildTrigger:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub image-build-trigger-${AWS::StackName}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ImageBuildTriggerRole.Arn
      Timeout: 900
      Code:
        ZipFile: |
          import boto3, json, time, urllib.request

          def handler(event, context):
              cb = boto3.client("codebuild")
              props = event.get("ResourceProperties", {})
              project = props["ProjectName"]

              if event["RequestType"] == "Delete":
                  return send(event, context, "SUCCESS", {})

              try:
                  resp = cb.start_build(projectName=project)
                  build_id = resp["build"]["id"]
                  while True:
                      time.sleep(15)
                      builds = cb.batch_get_builds(ids=[build_id])["builds"]
                      status = builds[0]["buildStatus"]
                      if status == "SUCCEEDED":
                          return send(event, context, "SUCCESS", {"BuildId": build_id})
                      if status in ("FAILED", "FAULT", "STOPPED", "TIMED_OUT"):
                          return send(event, context, "FAILED", {}, f"Build {status}: {build_id}")
                      remaining = context.get_remaining_time_in_millis()
                      if remaining < 30000:
                          return send(event, context, "FAILED", {}, "Lambda timeout waiting for build")
              except Exception as e:
                  return send(event, context, "FAILED", {}, str(e))

          def send(event, context, status, data, reason=""):
              body = json.dumps({
                  "Status": status,
                  "Reason": reason or f"See CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data,
              }).encode()
              req = urllib.request.Request(event["ResponseURL"], data=body, method="PUT")
              req.add_header("Content-Type", "")
              req.add_header("Content-Length", str(len(body)))
              urllib.request.urlopen(req)

  ImageBuild:
    Type: Custom::ImageBuild
    DependsOn:
      - ProvisionerECRRepo
      - DeployBucket
    Properties:
      ServiceToken: !GetAtt ImageBuildTrigger.Arn
      ProjectName: !Ref ImageBuildProject

  # ── S3 Buckets ──────────────────────────────────────────────────────
  IngestBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    DependsOn: ScanQueuePolicy
    Properties:
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Queue: !GetAtt ScanQueue.Arn
      Tags:
        - Key: Name
          Value: !Sub IngestBucket-${AWS::StackName}

  CleanBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Tags:
        - Key: Name
          Value: !Sub CleanBucket-${AWS::StackName}

  QuarantineBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Tags:
        - Key: Name
          Value: !Sub QuarantineBucket-${AWS::StackName}

  # ── EFS (Large File Scanning via NFS Mount Point) ──────────────────
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref BaseVPC
      GroupDescription: EFS mount targets - NFS from Lambda and Service Gateway
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 10.2.0.0/16
          Description: NFS from VPC (Lambda and Service Gateway)
      Tags:
        - Key: Name
          Value: !Sub EFSSecGroup-${AWS::StackName}

  ScanFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: elastic
      FileSystemTags:
        - Key: Name
          Value: !Sub ScanEFS-${AWS::StackName}

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref ScanFileSystem
      SubnetId: !Ref PrivateSubnet1
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref ScanFileSystem
      SubnetId: !Ref PrivateSubnet2
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref ScanFileSystem
      PosixUser:
        Uid: "1000"
        Gid: "1000"
      RootDirectory:
        Path: /scan-inbox
        CreationInfo:
          OwnerUid: "1000"
          OwnerGid: "1000"
          Permissions: "0777"

  # ── SQS ────────────────────────────────────────────────────────────
  ScanQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 900
      MessageRetentionPeriod: 1209600
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ScanDLQ.Arn
        maxReceiveCount: 5
      Tags:
        - Key: Name
          Value: !Sub ScanQueue-${AWS::StackName}

  ScanDLQ:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 120
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Name
          Value: !Sub ScanDLQ-${AWS::StackName}

  ScanQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref ScanQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt ScanQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:s3:::${AWS::StackName}-*"

  # ── DLQ Remediation Lambda ─────────────────────────────────────────
  DLQRemediationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DLQRemediationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt ScanDLQ.Arn
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt ScanQueue.Arn

  DLQRemediationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub dlq-remediation-${AWS::StackName}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt DLQRemediationRole.Arn
      Timeout: 60
      Environment:
        Variables:
          QUEUE_URL: !Ref ScanQueue
          MAX_DLQ_RETRIES: "3"
      Code:
        ZipFile: |
          import boto3, json, os, logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          sqs = boto3.client("sqs")
          QUEUE_URL = os.environ["QUEUE_URL"]
          MAX_RETRIES = int(os.environ["MAX_DLQ_RETRIES"])

          def handler(event, context):
              for record in event.get("Records", []):
                  body = record["body"]
                  attrs = record.get("messageAttributes", {})
                  retry = int(attrs.get("DLQRetryCount", {}).get("stringValue", "0"))

                  if retry >= MAX_RETRIES:
                      logger.warning("PERMANENT_FAILURE after %d DLQ retries: %s", retry, body[:200])
                      continue

                  retry += 1
                  delay = min(60 * (5 ** (retry - 1)), 900)
                  logger.info("DLQ retry %d/%d (delay %ds): %s", retry, MAX_RETRIES, delay, body[:200])

                  sqs.send_message(
                      QueueUrl=QUEUE_URL,
                      MessageBody=body,
                      DelaySeconds=delay,
                      MessageAttributes={
                          "DLQRetryCount": {
                              "DataType": "Number",
                              "StringValue": str(retry),
                          }
                      },
                  )

  DLQRemediationEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt ScanDLQ.Arn
      FunctionName: !Ref DLQRemediationLambda
      BatchSize: 10
      Enabled: true

  # ── Reconciliation Lambda ─────────────────────────────────────────
  ReconciliationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ReconciliationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt IngestBucket.Arn
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt ScanQueue.Arn

  ReconciliationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub reconciliation-${AWS::StackName}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ReconciliationRole.Arn
      Timeout: 300
      Environment:
        Variables:
          INGEST_BUCKET: !Ref IngestBucket
          QUEUE_URL: !Ref ScanQueue
          AGE_THRESHOLD_SECONDS: "1800"
      Code:
        ZipFile: |
          import boto3, json, os, time, logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          s3 = boto3.client("s3")
          sqs = boto3.client("sqs")
          BUCKET = os.environ["INGEST_BUCKET"]
          QUEUE_URL = os.environ["QUEUE_URL"]
          AGE_THRESHOLD = int(os.environ["AGE_THRESHOLD_SECONDS"])

          def handler(event, context):
              now = time.time()
              requeued = 0
              paginator = s3.get_paginator("list_objects_v2")
              for page in paginator.paginate(Bucket=BUCKET):
                  for obj in page.get("Contents", []):
                      age = now - obj["LastModified"].timestamp()
                      if age > AGE_THRESHOLD:
                          event_body = {
                              "Records": [{
                                  "s3": {
                                      "bucket": {"name": BUCKET},
                                      "object": {"key": obj["Key"], "size": obj["Size"]}
                                  }
                              }]
                          }
                          sqs.send_message(QueueUrl=QUEUE_URL, MessageBody=json.dumps(event_body))
                          requeued += 1
              logger.info("Reconciliation: re-queued %d orphaned files (threshold %ds)", requeued, AGE_THRESHOLD)
              return {"requeued": requeued}

  ReconciliationSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub reconciliation-${AWS::StackName}
      Description: Re-queue orphaned files in the ingest bucket every 5 minutes
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt ReconciliationLambda.Arn
          Id: ReconciliationTarget

  ReconciliationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReconciliationLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ReconciliationSchedule.Arn

  # ── CloudWatch Audit Log ───────────────────────────────────────────
  AuditLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub scan-audit-${AWS::StackName}
      RetentionInDays: 90

  # ── Scanner Lambda ──────────────────────────────────────────────────
  ScannerLambdaSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref BaseVPC
      GroupDescription: Scanner Lambda - egress to Service Gateway and AWS APIs
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS to Service Gateway and AWS APIs
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 10.2.0.0/16
          Description: NFS to EFS (large file scanning)
      Tags:
        - Key: Name
          Value: !Sub ScannerLambdaSecGroup-${AWS::StackName}

  ScannerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: ScannerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt ScanQueue.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt IngestBucket.Arn
                  - !Sub "${IngestBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectTagging
                  - s3:CopyObject
                Resource:
                  - !Sub "${CleanBucket.Arn}/*"
                  - !Sub "${QuarantineBucket.Arn}/*"
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                Resource: !GetAtt ScanFileSystem.Arn

  ScannerLayer:
    Type: AWS::Lambda::LayerVersion
    DependsOn: ImageBuild
    Properties:
      LayerName: !Sub scanner-deps-${AWS::StackName}
      Content:
        S3Bucket: !Ref DeployBucket
        S3Key: scanner-layer.zip
      CompatibleRuntimes:
        - python3.12

  ScannerLambda:
    Type: AWS::Lambda::Function
    DependsOn:
      - SGWaitForScanner1
      - ImageBuild
      - EFSMountTarget1
      - EFSMountTarget2
    Properties:
      FunctionName: !Sub scanner-${AWS::StackName}
      Runtime: python3.12
      Handler: scanner.handler
      Code:
        S3Bucket: !Ref DeployBucket
        S3Key: scanner-code.zip
      Layers:
        - !Ref ScannerLayer
      Role: !GetAtt ScannerLambdaRole.Arn
      Timeout: 900
      MemorySize: 1024
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        SecurityGroupIds:
          - !Ref ScannerLambdaSecGroup
      FileSystemConfigs:
        - Arn: !GetAtt EFSAccessPoint.Arn
          LocalMountPath: /mnt/efs
      Environment:
        Variables:
          S3_CLEAN_BUCKET: !Ref CleanBucket
          S3_QUARANTINE_BUCKET: !Ref QuarantineBucket
          SG_ADDRESS: !If
            - DeploySG3
            - !Sub "${ServiceGateway1.PrivateIp}:443,${ServiceGateway2.PrivateIp}:443,${ServiceGateway3.PrivateIp}:443"
            - !If
              - DeploySG2
              - !Sub "${ServiceGateway1.PrivateIp}:443,${ServiceGateway2.PrivateIp}:443"
              - !Sub "${ServiceGateway1.PrivateIp}:443"
          SG_CA_CERT_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/sg-ca-cert"
          V1FS_API_KEY_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/vision-one-api-key"
          AUDIT_LOG_GROUP: !Sub scan-audit-${AWS::StackName}
          PML_ENABLED: !Ref PMLEnabled
          FEEDBACK_ENABLED: !Ref SmartFeedbackEnabled
          CHANNELS_PER_SG: !Ref ChannelsPerSG
          EFS_MOUNT_PATH: /mnt/efs
          LOG_LEVEL: INFO

  ScannerEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt ScanQueue.Arn
      FunctionName: !Ref ScannerLambda
      BatchSize: 1
      MaximumBatchingWindowInSeconds: 0
      FunctionResponseTypes:
        - ReportBatchItemFailures

  # ── Alarms & Notifications ─────────────────────────────────────────
  AlarmSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub scan-alarms-${AWS::StackName}
      Tags:
        - Key: Name
          Value: !Sub AlarmSNSTopic-${AWS::StackName}

  DLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-dlq-messages
      AlarmDescription: Messages in the dead-letter queue indicate scan failures after 3 retries
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScanDLQ.QueueName
      AlarmActions:
        - !Ref AlarmSNSTopic
      OKActions:
        - !Ref AlarmSNSTopic

  QueueAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-queue-age
      AlarmDescription: Oldest message age exceeds 20 minutes for 5 consecutive minutes — scanner may be stuck or unable to keep up
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 5
      Threshold: 1200
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScanQueue.QueueName
      AlarmActions:
        - !Ref AlarmSNSTopic
      OKActions:
        - !Ref AlarmSNSTopic

