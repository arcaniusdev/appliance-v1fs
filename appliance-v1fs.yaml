AWSTemplateFormatVersion: "2010-09-09"
Description: TrendAI Service Gateway File Scanner - Network Infrastructure

Mappings:
  ServiceGatewayAMI:
    ap-northeast-1:
      AMI: ami-061b8e13afe1358d6
    ap-northeast-2:
      AMI: ami-06d290f555649e7cf
    ap-northeast-3:
      AMI: ami-00f25d39db251653f
    ap-south-1:
      AMI: ami-0a2f9a344b741d105
    ap-southeast-1:
      AMI: ami-0314c89685371c51b
    ap-southeast-2:
      AMI: ami-041754942552affa3
    ca-central-1:
      AMI: ami-07402a3cb195e17fc
    eu-central-1:
      AMI: ami-052395dc73896c7e9
    eu-north-1:
      AMI: ami-01da7559532215e43
    eu-west-1:
      AMI: ami-0464d17a390eaa185
    eu-west-2:
      AMI: ami-074a722115304208d
    eu-west-3:
      AMI: ami-0fb56479bb67150e8
    sa-east-1:
      AMI: ami-0fceef1ddaea68074
    us-east-1:
      AMI: ami-0cc07c329eab4df1c
    us-east-2:
      AMI: ami-070f04f9bc3eea5f5
    us-west-1:
      AMI: ami-0d82ee727bafa15e8
    us-west-2:
      AMI: ami-0bcbbe1b09927f3d7

Parameters:
  PrimaryAZ:
    Description: Availability Zone 1
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1a
  SecondaryAZ:
    Description: Availability Zone 2
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1b
  ServiceGatewayHostname:
    Description: Hostname prefix for Service Gateway appliances (numbered automatically)
    Type: String
    Default: FSVA-AWS
  ServiceGatewayMinCount:
    Description: Minimum Service Gateways (always running)
    Type: Number
    Default: 1
    MinValue: 1
  ServiceGatewayMaxCount:
    Description: Maximum Service Gateways (includes warm pool)
    Type: Number
    Default: 6
    MinValue: 1
  PMLEnabled:
    Description: Enable Predictive Machine Learning (PML) for scans
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  SmartFeedbackEnabled:
    Description: Enable Smart Feedback (scan telemetry sent to TrendAI for threat intelligence)
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  ServiceGatewayInstanceType:
    Description: EC2 instance type for Service Gateway appliances
    Type: String
    Default: c5.2xlarge
    AllowedValues:
      - c5.2xlarge
      - c5.4xlarge
      - c5.9xlarge
  MaxFileSizeMB:
    Description: Maximum file size in MB for gRPC scanning (nginx and gRPC channel limit)
    Type: Number
    Default: 500
    MinValue: 10
    MaxValue: 2048
  OrgId:
    Description: AWS Organization ID — enables cross-account scanning for org members (leave empty for single-account)
    Type: String
    Default: ""
  RescanAfterDays:
    Description: Re-scan files whose last scan is older than this many days
    Type: Number
    Default: 30
    MinValue: 1
  WorkerInstanceType:
    Description: EC2 instance type for scanner worker fleet
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
  WorkerMinCount:
    Description: Minimum number of scanner workers (HA across AZs)
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 20
  WorkerMaxCount:
    Description: Maximum number of scanner workers (scales on queue depth)
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 50
  WorkerConcurrency:
    Description: Concurrent scans per worker instance
    Type: Number
    Default: 50
    MinValue: 1
    MaxValue: 200

Resources:
  # ── VPC ──────────────────────────────────────────────────────────────
  BaseVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.2.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Sub BaseVPC-${AWS::StackName}

  # ── Internet Gateway ────────────────────────────────────────────────
  IG:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub IG-${AWS::StackName}

  VPCIG:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref IG
      VpcId: !Ref BaseVPC

  # ── Public Subnets ──────────────────────────────────────────────────
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.0.0/22
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref PrimaryAZ
      Tags:
        - Key: Name
          Value: !Sub PublicSubnet1-${AWS::StackName}

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.4.0/22
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref SecondaryAZ
      Tags:
        - Key: Name
          Value: !Sub PublicSubnet2-${AWS::StackName}

  # ── Private Subnets ─────────────────────────────────────────────────
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.32.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref PrimaryAZ
      Tags:
        - Key: Name
          Value: !Sub PrivateSubnet1-${AWS::StackName}

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.48.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref SecondaryAZ
      Tags:
        - Key: Name
          Value: !Sub PrivateSubnet2-${AWS::StackName}

  # ── NAT Gateway EIPs ────────────────────────────────────────────────
  NGWEIP1:
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP1-${AWS::StackName}

  NGWEIP2:
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP2-${AWS::StackName}

  # ── NAT Gateways ────────────────────────────────────────────────────
  NGW1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP1.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub NGW1-${AWS::StackName}

  NGW2:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP2.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub NGW2-${AWS::StackName}

  # ── Public Route Tables ─────────────────────────────────────────────
  PublicRT1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT1-${AWS::StackName}

  PublicRoute1:
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT1
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  PublicRT2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT2-${AWS::StackName}

  PublicRoute2:
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT2
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  # ── Private Route Tables ────────────────────────────────────────────
  PrivateRT1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PrivateRT1-${AWS::StackName}

  PrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRT1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NGW1

  PrivateRT2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PrivateRT2-${AWS::StackName}

  PrivateRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRT2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NGW2

  # ── Route Table Associations ────────────────────────────────────────
  PublicSubnetRT1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRT1
      SubnetId: !Ref PublicSubnet1

  PublicSubnetRT2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRT2
      SubnetId: !Ref PublicSubnet2

  PrivateSubnetRT1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRT1
      SubnetId: !Ref PrivateSubnet1

  PrivateSubnetRT2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRT2
      SubnetId: !Ref PrivateSubnet2

  # ── S3 Gateway VPC Endpoint ────────────────────────────────────────
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRT1
        - !Ref PrivateRT2

  # ── Interface VPC Endpoints (keep AWS API traffic off the internet) ─
  VPCEndpointSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref BaseVPC
      GroupDescription: HTTPS access for VPC Interface Endpoints
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.2.0.0/16
          Description: HTTPS from VPC
      Tags:
        - Key: Name
          Value: !Sub VPCEndpointSG-${AWS::StackName}

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.secretsmanager
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  SQSEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.sqs
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  CloudWatchLogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.logs
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  SSMEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ssm
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  AutoScalingEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.autoscaling
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  STSEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.sts
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  SSMMessagesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ssmmessages
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  EC2MessagesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ec2messages
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  EC2Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref BaseVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ec2
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecGroup

  # ── SSH Key Pair ────────────────────────────────────────────────────
  ServiceGatewayKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub ServiceGatewayKeyPair-${AWS::StackName}
      KeyType: ed25519
      Tags:
        - Key: Name
          Value: !Sub ServiceGatewayKeyPair-${AWS::StackName}

  # ── Service Gateway ────────────────────────────────────────────────
  ServiceGatewaySecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref BaseVPC
      GroupDescription: Service Gateway appliance - inbound scan traffic and management
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.2.0.0/16
          Description: HTTPS from VPC (SDK gRPC, management)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 10.2.0.0/16
          Description: SSH from VPC (CLI management)
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS outbound (Vision One, updates)
      Tags:
        - Key: Name
          Value: !Sub ServiceGatewaySecGroup-${AWS::StackName}

  # ── Service Gateway ──────────────────────────────────────────────
  ServiceGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  ServiceGatewayInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ServiceGatewayRole

  ServiceGatewayLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ServiceGateway-${AWS::StackName}
      LaunchTemplateData:
        ImageId: !FindInMap [ServiceGatewayAMI, !Ref "AWS::Region", AMI]
        InstanceType: !Ref ServiceGatewayInstanceType
        KeyName: !Ref ServiceGatewayKeyPair
        IamInstanceProfile:
          Arn: !GetAtt ServiceGatewayInstanceProfile.Arn
        SecurityGroupIds:
          - !Ref ServiceGatewaySecGroup
        HibernationOptions:
          Configured: true
        BlockDeviceMappings:
          - DeviceName: /dev/sda1
            Ebs:
              VolumeSize: 200
              VolumeType: gp3
              Encrypted: true
        MetadataOptions:
          HttpTokens: required
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: appliance-v1fs:stack
                Value: !Ref "AWS::StackName"

  # ── Service Gateway ASG + Warm Pool ──────────────────────────────
  ServiceGatewayASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn:
      - PrivateRoute1
      - PrivateRoute2
      - ProvisionerEventPermission
    Properties:
      AutoScalingGroupName: !Sub sg-asg-${AWS::StackName}
      LaunchTemplate:
        LaunchTemplateId: !Ref ServiceGatewayLaunchTemplate
        Version: !GetAtt ServiceGatewayLaunchTemplate.LatestVersionNumber
      MinSize: 0
      MaxSize: !Ref ServiceGatewayMaxCount
      DesiredCapacity: !Ref ServiceGatewayMaxCount
      VPCZoneIdentifier:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      HealthCheckType: EC2
      HealthCheckGracePeriod: 600
      LifecycleHookSpecificationList:
        - LifecycleHookName: SGLaunchHook
          LifecycleTransition: autoscaling:EC2_INSTANCE_LAUNCHING
          HeartbeatTimeout: 3600
          DefaultResult: ABANDON
      TargetGroupARNs:
        - !Ref GrpcTargetGroup
      Tags:
        - Key: Name
          Value: !Sub ${ServiceGatewayHostname}
          PropagateAtLaunch: true

  ServiceGatewayWarmPool:
    Type: AWS::AutoScaling::WarmPool
    Properties:
      AutoScalingGroupName: !Ref ServiceGatewayASG
      PoolState: Hibernated
      MinSize: 0
      InstanceReusePolicy:
        ReuseOnScaleIn: true

  SGScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref ServiceGatewayASG
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ALBRequestCountPerTarget
          ResourceLabel: !Sub "${ScannerALB.LoadBalancerFullName}/${GrpcTargetGroup.TargetGroupFullName}"
        TargetValue: 1800
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # ── ALB Certificate (self-signed, imported to ACM) ────────────────
  ALBCertRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ALBCertPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - acm:ImportCertificate
                  - acm:DeleteCertificate
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:PutSecretValue
                  - secretsmanager:DeleteSecret
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/*"

  ALBCertLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub alb-cert-${AWS::StackName}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ALBCertRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3, json, logging, subprocess, os
          from urllib.request import urlopen, Request
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              try:
                  props = event["ResourceProperties"]
                  secret_name = props["SecretName"]
                  acm = boto3.client("acm")
                  sm = boto3.client("secretsmanager")

                  if event["RequestType"] == "Delete":
                      # Clean up ACM cert
                      cert_arn = event.get("PhysicalResourceId", "")
                      if cert_arn.startswith("arn:aws:acm:"):
                          try:
                              acm.delete_certificate(CertificateArn=cert_arn)
                              logger.info("Deleted ACM cert: %s", cert_arn)
                          except Exception:
                              logger.warning("Could not delete ACM cert", exc_info=True)
                      # Clean up secret
                      try:
                          sm.delete_secret(SecretId=secret_name, ForceDeleteWithoutRecovery=True)
                          logger.info("Deleted secret: %s", secret_name)
                      except Exception:
                          logger.warning("Could not delete secret", exc_info=True)
                      _respond(event, context, "SUCCESS", physical_id=cert_arn)
                      return

                  # Generate self-signed cert + key
                  key_path = "/tmp/alb.key"
                  cert_path = "/tmp/alb.crt"
                  subprocess.run([
                      "openssl", "req", "-x509", "-newkey", "rsa:2048",
                      "-keyout", key_path, "-out", cert_path,
                      "-days", "3650", "-nodes",
                      "-subj", "/CN=scanner-alb.internal",
                  ], check=True, capture_output=True)

                  with open(cert_path, "rb") as f:
                      cert_pem = f.read()
                  with open(key_path, "rb") as f:
                      key_pem = f.read()

                  # Import into ACM
                  resp = acm.import_certificate(
                      Certificate=cert_pem,
                      PrivateKey=key_pem,
                  )
                  cert_arn = resp["CertificateArn"]
                  logger.info("Imported ACM cert: %s", cert_arn)

                  # Store CA cert in Secrets Manager for workers
                  cert_str = cert_pem.decode("utf-8")
                  try:
                      sm.create_secret(
                          Name=secret_name,
                          Description="ALB self-signed CA certificate (PEM)",
                          SecretString=cert_str,
                      )
                  except sm.exceptions.ResourceExistsException:
                      sm.put_secret_value(SecretId=secret_name, SecretString=cert_str)
                  logger.info("Stored CA cert in secret: %s", secret_name)

                  _respond(event, context, "SUCCESS",
                           data={"CertificateArn": cert_arn},
                           physical_id=cert_arn)
              except Exception as e:
                  logger.exception("ALB cert generation failed")
                  _respond(event, context, "FAILED", reason=str(e))

          def _respond(event, context, status, data=None, reason="", physical_id=None):
              body = json.dumps({
                  "Status": status,
                  "Reason": reason or f"See CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": physical_id or context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data or {},
              }).encode("utf-8")
              req = Request(event["ResponseURL"], data=body, method="PUT")
              req.add_header("Content-Type", "")
              req.add_header("Content-Length", str(len(body)))
              urlopen(req)

  ALBCertResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt ALBCertLambda.Arn
      SecretName: appliance-v1fs/alb-ca-cert

  # ── Scanner ALB (internal gRPC load balancer) ────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref BaseVPC
      GroupDescription: Scanner ALB - gRPC traffic from workers to Service Gateways
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.2.0.0/16
          Description: HTTPS/gRPC from VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          DestinationSecurityGroupId: !Ref ServiceGatewaySecGroup
          Description: HTTPS to Service Gateways
      Tags:
        - Key: Name
          Value: !Sub ALBSecGroup-${AWS::StackName}

  ScannerALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub scanner-alb-${AWS::StackName}
      Scheme: internal
      Type: application
      Subnets:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ScannerALB-${AWS::StackName}

  GrpcTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub grpc-tg-${AWS::StackName}
      Port: 443
      Protocol: HTTPS
      ProtocolVersion: GRPC
      VpcId: !Ref BaseVPC
      TargetType: instance
      HealthCheckProtocol: HTTPS
      HealthCheckPort: "443"
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Matcher:
        GrpcCode: "0-99"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        - Key: stickiness.enabled
          Value: "false"
      # Targets managed dynamically by ServiceGatewayASG TargetGroupARNs

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ScannerALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !GetAtt ALBCertResource.CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref GrpcTargetGroup

  # ── Provisioner EventBridge (EC2 state change → Lambda) ─────────
  ProvisionerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub sg-provision-${AWS::StackName}
      Description: Trigger provisioner when SG instances reach running state
      EventPattern:
        source:
          - aws.ec2
        detail-type:
          - "EC2 Instance State-change Notification"
        detail:
          state:
            - running
      State: ENABLED
      Targets:
        - Arn: !GetAtt ProvisionerLambda.Arn
          Id: ProvisionerTarget

  ProvisionerEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProvisionerLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ProvisionerEventRule.Arn

  # ── Code Build ────────────────────────────────────────────────────
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${DeployBucket}/*"

  DeployBucket:
    Type: AWS::S3::Bucket
    Properties:
      Tags:
        - Key: Name
          Value: !Sub DeployBucket-${AWS::StackName}

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    DependsOn: DeployBucket
    Properties:
      Name: !Sub appliance-v1fs-build-${AWS::StackName}
      ServiceRole: !GetAtt CodeBuildRole.Arn
      TimeoutInMinutes: 15
      Environment:
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        Type: LINUX_CONTAINER
        EnvironmentVariables:
          - Name: DEPLOY_BUCKET
            Value: !Ref DeployBucket
      Source:
        Type: GITHUB
        Location: https://github.com/arcaniusdev/appliance-v1fs.git
        BuildSpec: buildspec.yml
      Artifacts:
        Type: NO_ARTIFACTS

  CodeBuildTriggerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TriggerBuild
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:DeleteObject
                  - s3:ListBucketVersions
                  - s3:DeleteObjectVersion
                Resource:
                  - !GetAtt DeployBucket.Arn
                  - !Sub "${DeployBucket.Arn}/*"

  CodeBuildTrigger:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub image-build-trigger-${AWS::StackName}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CodeBuildTriggerRole.Arn
      Timeout: 900
      Code:
        ZipFile: |
          import boto3, json, time, urllib.request

          def handler(event, context):
              cb = boto3.client("codebuild")
              props = event.get("ResourceProperties", {})
              project = props["ProjectName"]

              if event["RequestType"] == "Delete":
                  bucket = props.get("DeployBucket", "")
                  if bucket:
                      s3 = boto3.client("s3")
                      try:
                          while True:
                              objs = s3.list_object_versions(Bucket=bucket, MaxKeys=1000)
                              to_delete = [{"Key": o["Key"], "VersionId": o["VersionId"]} for o in objs.get("Versions", [])]
                              to_delete += [{"Key": o["Key"], "VersionId": o["VersionId"]} for o in objs.get("DeleteMarkers", [])]
                              if not to_delete:
                                  break
                              s3.delete_objects(Bucket=bucket, Delete={"Objects": to_delete})
                      except Exception as e:
                          print(f"Bucket cleanup warning: {e}")
                  return send(event, context, "SUCCESS", {})

              try:
                  resp = cb.start_build(projectName=project)
                  build_id = resp["build"]["id"]
                  while True:
                      time.sleep(15)
                      builds = cb.batch_get_builds(ids=[build_id])["builds"]
                      status = builds[0]["buildStatus"]
                      if status == "SUCCEEDED":
                          return send(event, context, "SUCCESS", {"BuildId": build_id})
                      if status in ("FAILED", "FAULT", "STOPPED", "TIMED_OUT"):
                          return send(event, context, "FAILED", {}, f"Build {status}: {build_id}")
                      remaining = context.get_remaining_time_in_millis()
                      if remaining < 30000:
                          return send(event, context, "FAILED", {}, "Lambda timeout waiting for build")
              except Exception as e:
                  return send(event, context, "FAILED", {}, str(e))

          def send(event, context, status, data, reason=""):
              body = json.dumps({
                  "Status": status,
                  "Reason": reason or f"See CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data,
              }).encode()
              req = urllib.request.Request(event["ResponseURL"], data=body, method="PUT")
              req.add_header("Content-Type", "")
              req.add_header("Content-Length", str(len(body)))
              urllib.request.urlopen(req)

  CodeBuild:
    Type: Custom::CodeBuild
    DependsOn: DeployBucket
    Properties:
      ServiceToken: !GetAtt CodeBuildTrigger.Arn
      ProjectName: !Ref CodeBuildProject
      DeployBucket: !Ref DeployBucket

  # ── S3 Buckets ──────────────────────────────────────────────────────
  SourceBucket:
    Type: AWS::S3::Bucket
    DependsOn: ReplicationRole
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "source-${AWS::StackName}"
      VersioningConfiguration:
        Status: Enabled
      ReplicationConfiguration:
        Role: !GetAtt ReplicationRole.Arn
        Rules:
          - Id: replicate-to-scan-bucket
            Status: Enabled
            Destination:
              Bucket: !Sub "arn:aws:s3:::scan-${AWS::StackName}"
              StorageClass: STANDARD
      Tags:
        - Key: Name
          Value: !Sub SourceBucket-${AWS::StackName}

  SourceBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SourceBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyMalwareAccess
            Effect: Deny
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${SourceBucket.Arn}/*"
            Condition:
              StringEquals:
                "s3:ExistingObjectTag/ScanResult": "Malware"

  ScanBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "scan-${AWS::StackName}"
      VersioningConfiguration:
        Status: Enabled
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      Tags:
        - Key: Name
          Value: !Sub ScanBucket-${AWS::StackName}

  ReplicationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReplicationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetReplicationConfiguration
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::source-${AWS::StackName}"
              - Effect: Allow
                Action:
                  - s3:GetObjectVersionForReplication
                  - s3:GetObjectVersionAcl
                  - s3:GetObjectVersionTagging
                Resource: !Sub "arn:aws:s3:::source-${AWS::StackName}/*"
              - Effect: Allow
                Action:
                  - s3:ReplicateObject
                  - s3:ReplicateDelete
                  - s3:ReplicateTags
                Resource: !Sub "arn:aws:s3:::scan-${AWS::StackName}/*"

  QuarantineBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Tags:
        - Key: Name
          Value: !Sub QuarantineBucket-${AWS::StackName}

  # ── EventBridge Fan-In (S3 Object Created → SQS) ──────────────────
  ScanEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub scan-ingest-${AWS::StackName}
      Description: Route S3 object-created events from the scan bucket to the scan queue
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - "Object Created"
        detail:
          bucket:
            name:
              - !Ref ScanBucket
      State: ENABLED
      Targets:
        - Arn: !GetAtt ScanQueue.Arn
          Id: ScanQueueTarget

  # ── SQS ────────────────────────────────────────────────────────────
  ScanQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ScanDLQ.Arn
        maxReceiveCount: 5
      Tags:
        - Key: Name
          Value: !Sub ScanQueue-${AWS::StackName}

  ScanDLQ:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 120
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Name
          Value: !Sub ScanDLQ-${AWS::StackName}

  ScanQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref ScanQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt ScanQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt ScanEventRule.Arn

  # ── DLQ Remediation Lambda ─────────────────────────────────────────
  DLQRemediationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DLQRemediationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt ScanDLQ.Arn
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt ScanQueue.Arn

  DLQRemediationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub dlq-remediation-${AWS::StackName}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt DLQRemediationRole.Arn
      Timeout: 60
      Environment:
        Variables:
          QUEUE_URL: !Ref ScanQueue
          MAX_DLQ_RETRIES: "3"
      Code:
        ZipFile: |
          import boto3, json, os, logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          sqs = boto3.client("sqs")
          QUEUE_URL = os.environ["QUEUE_URL"]
          MAX_RETRIES = int(os.environ["MAX_DLQ_RETRIES"])

          def handler(event, context):
              for record in event.get("Records", []):
                  body = record["body"]
                  attrs = record.get("messageAttributes", {})
                  retry = int(attrs.get("DLQRetryCount", {}).get("stringValue", "0"))

                  if retry >= MAX_RETRIES:
                      logger.warning("PERMANENT_FAILURE after %d DLQ retries: %s", retry, body[:200])
                      continue

                  retry += 1
                  delay = min(60 * (5 ** (retry - 1)), 900)
                  logger.info("DLQ retry %d/%d (delay %ds): %s", retry, MAX_RETRIES, delay, body[:200])

                  sqs.send_message(
                      QueueUrl=QUEUE_URL,
                      MessageBody=body,
                      DelaySeconds=delay,
                      MessageAttributes={
                          "DLQRetryCount": {
                              "DataType": "Number",
                              "StringValue": str(retry),
                          }
                      },
                  )

  DLQRemediationEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt ScanDLQ.Arn
      FunctionName: !Ref DLQRemediationLambda
      BatchSize: 10
      Enabled: true

  # ── Reconciliation Lambda ─────────────────────────────────────────
  ReconciliationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ReconciliationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketNotificationConfiguration
                  - s3:GetObjectTagging
                Resource: "arn:aws:s3:::*"
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt ScanQueue.Arn
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/appliance-v1fs/*"
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: "arn:aws:iam::*:role/appliance-v1fs-scanner-access"

  ReconciliationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub reconciliation-${AWS::StackName}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ReconciliationRole.Arn
      Timeout: 900
      Environment:
        Variables:
          QUEUE_URL: !Ref ScanQueue
          RESCAN_AFTER_DAYS: !Ref RescanAfterDays
          SCANNER_ACCOUNT_ID: !Ref "AWS::AccountId"
          CROSS_ACCOUNT_BUCKETS_PARAM: /appliance-v1fs/cross-account-buckets
      Code:
        ZipFile: |
          import boto3, json, os, logging
          from datetime import datetime, timezone, timedelta

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          s3 = boto3.client("s3")
          sqs = boto3.client("sqs")
          ssm = boto3.client("ssm")
          sts = boto3.client("sts")
          QUEUE_URL = os.environ["QUEUE_URL"]
          RESCAN_DAYS = int(os.environ["RESCAN_AFTER_DAYS"])
          SCANNER_ACCOUNT = os.environ["SCANNER_ACCOUNT_ID"]
          XACCT_PARAM = os.environ["CROSS_ACCOUNT_BUCKETS_PARAM"]
          ENROLLED_PARAM = "/appliance-v1fs/enrolled-buckets"
          BACKFILLED_PARAM = "/appliance-v1fs/backfilled-buckets"

          def _get_ssm_json(name, default):
              try:
                  return json.loads(ssm.get_parameter(Name=name)["Parameter"]["Value"])
              except (ssm.exceptions.ParameterNotFound, json.JSONDecodeError):
                  return default

          def _get_ssm_csv(name):
              try:
                  return set(ssm.get_parameter(Name=name)["Parameter"]["Value"].split(","))
              except ssm.exceptions.ParameterNotFound:
                  return set()

          def _assume_role(account_id):
              role = f"arn:aws:iam::{account_id}:role/appliance-v1fs-scanner-access"
              creds = sts.assume_role(RoleArn=role, RoleSessionName="reconciliation")["Credentials"]
              return boto3.client("s3",
                  aws_access_key_id=creds["AccessKeyId"],
                  aws_secret_access_key=creds["SecretAccessKey"],
                  aws_session_token=creds["SessionToken"])

          def _queue(bucket, key, size, account):
              body = {"source": "aws.s3", "detail-type": "Object Created", "account": account,
                      "detail": {"bucket": {"name": bucket}, "object": {"key": key, "size": size}}}
              sqs.send_message(QueueUrl=QUEUE_URL, MessageBody=json.dumps(body))

          def _scan_bucket(s3c, bucket, account, is_new, cutoff):
              queued = 0
              paginator = s3c.get_paginator("list_objects_v2")
              for page in paginator.paginate(Bucket=bucket):
                  for obj in page.get("Contents", []):
                      if not is_new and obj["LastModified"].replace(tzinfo=timezone.utc) > cutoff:
                          continue
                      try:
                          resp = s3c.get_object_tagging(Bucket=bucket, Key=obj["Key"])
                          tags = {t["Key"]: t["Value"] for t in resp.get("TagSet", [])}
                      except Exception:
                          tags = {}
                      needs_scan = False
                      if "ScanResult" not in tags:
                          needs_scan = True
                      elif "ScanTimestamp" in tags:
                          try:
                              ts = datetime.fromisoformat(tags["ScanTimestamp"])
                              if ts < cutoff:
                                  needs_scan = True
                          except (ValueError, TypeError):
                              needs_scan = True
                      if needs_scan:
                          _queue(bucket, obj["Key"], obj.get("Size", 0), account)
                          queued += 1
              return queued

          def handler(event, context):
              cutoff = datetime.now(timezone.utc) - timedelta(days=RESCAN_DAYS)
              backfilled = set(_get_ssm_json(BACKFILLED_PARAM, []))
              total = 0

              # Same-account buckets
              enrolled = _get_ssm_csv(ENROLLED_PARAM)
              for bucket in enrolled:
                  key = f"{SCANNER_ACCOUNT}:{bucket}"
                  is_new = key not in backfilled
                  try:
                      q = _scan_bucket(s3, bucket, SCANNER_ACCOUNT, is_new, cutoff)
                      total += q
                      if is_new:
                          backfilled.add(key)
                      logger.info("Reconciliation: %s queued=%d new=%s", bucket, q, is_new)
                  except Exception:
                      logger.warning("Reconciliation: failed %s", bucket, exc_info=True)

              # Cross-account buckets
              xacct = _get_ssm_json(XACCT_PARAM, {})
              for account_id, buckets in xacct.items():
                  try:
                      xacct_s3 = _assume_role(account_id)
                  except Exception:
                      logger.warning("Reconciliation: failed assuming role for %s", account_id, exc_info=True)
                      continue
                  for bucket in buckets:
                      key = f"{account_id}:{bucket}"
                      is_new = key not in backfilled
                      try:
                          q = _scan_bucket(xacct_s3, bucket, account_id, is_new, cutoff)
                          total += q
                          if is_new:
                              backfilled.add(key)
                          logger.info("Reconciliation: %s:%s queued=%d new=%s", account_id, bucket, q, is_new)
                      except Exception:
                          logger.warning("Reconciliation: failed %s:%s", account_id, bucket, exc_info=True)

              # Persist backfilled set
              ssm.put_parameter(Name=BACKFILLED_PARAM, Value=json.dumps(sorted(backfilled)),
                                Type="String", Overwrite=True)
              logger.info("Reconciliation: total queued=%d", total)
              return {"queued": total}

  ReconciliationSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub reconciliation-${AWS::StackName}
      Description: Backfill unscanned files and re-scan stale files across all enrolled buckets
      ScheduleExpression: "rate(1 day)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt ReconciliationLambda.Arn
          Id: ReconciliationTarget

  ReconciliationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReconciliationLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ReconciliationSchedule.Arn

  # ── Cross-Account EventBridge Bus Policy ────────────────────────────
  OrgBusPolicyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: OrgBusPolicyPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: organizations:DescribeOrganization
                Resource: "*"
              - Effect: Allow
                Action:
                  - events:PutPermission
                  - events:RemovePermission
                  - events:DescribeEventBus
                Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"

  OrgBusPolicyLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub org-bus-policy-${AWS::StackName}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt OrgBusPolicyRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import boto3, json, logging
          from urllib.request import urlopen, Request
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          events = boto3.client("events")
          SID = "AllowOrgAccounts"

          def handler(event, context):
              try:
                  if event["RequestType"] == "Delete":
                      try:
                          events.remove_permission(EventBusName="default", StatementId=SID)
                          logger.info("Removed org bus policy")
                      except Exception:
                          pass
                      _respond(event, context, "SUCCESS", {"OrgId": ""})
                      return
                  override = event["ResourceProperties"].get("OrgIdOverride", "")
                  org_id = override
                  if not org_id:
                      try:
                          org = boto3.client("organizations").describe_organization()
                          org_id = org["Organization"]["Id"]
                          logger.info("Discovered OrgId: %s", org_id)
                      except Exception:
                          logger.info("Account is not in an organization")
                  if org_id:
                      events.put_permission(
                          EventBusName="default", Action="events:PutEvents",
                          Principal="*", StatementId=SID,
                          Condition={"Type": "StringEquals", "Key": "aws:PrincipalOrgID", "Value": org_id},
                      )
                      logger.info("Set org bus policy for %s", org_id)
                  else:
                      try:
                          events.remove_permission(EventBusName="default", StatementId=SID)
                      except Exception:
                          pass
                      logger.info("No org — bus policy not set")
                  _respond(event, context, "SUCCESS", {"OrgId": org_id})
              except Exception as e:
                  logger.exception("OrgBusPolicy failed")
                  _respond(event, context, "FAILED", reason=str(e))

          def _respond(event, context, status, data=None, reason=""):
              body = json.dumps({
                  "Status": status,
                  "Reason": reason or f"See CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data or {},
              }).encode("utf-8")
              req = Request(event["ResponseURL"], data=body, method="PUT")
              req.add_header("Content-Type", "")
              req.add_header("Content-Length", str(len(body)))
              urlopen(req)

  OrgBusPolicyResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt OrgBusPolicyLambda.Arn
      OrgIdOverride: !Ref OrgId

  # ── Pre-Populated Enrollment Template ──────────────────────────────
  EnrollmentTemplateRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EnrollmentTemplatePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::${DeployBucket}/*"
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub "arn:aws:s3:::${DeployBucket}"

  EnrollmentTemplateLambda:
    Type: AWS::Lambda::Function
    DependsOn: CodeBuild
    Properties:
      FunctionName: !Sub enrollment-template-${AWS::StackName}
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt EnrollmentTemplateRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3, json, logging
          from urllib.request import urlopen, Request
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          s3 = boto3.client("s3")

          def handler(event, context):
              try:
                  if event["RequestType"] == "Delete":
                      _respond(event, context, "SUCCESS")
                      return
                  props = event["ResourceProperties"]
                  bucket = props["DeployBucket"]
                  account_id = props["ScannerAccountId"]
                  role_arn = props["WorkerRoleArn"]
                  # Read raw enrollment template
                  resp = s3.get_object(Bucket=bucket, Key="enrollment.yaml")
                  template = resp["Body"].read().decode("utf-8")
                  # Replace parameter defaults with actual values
                  template = template.replace(
                      'AllowedPattern: "[0-9]{12}"',
                      f'AllowedPattern: "[0-9]{{12}}"\n    Default: "{account_id}"',
                  )
                  template = template.replace(
                      "  WorkerRoleArn:\n    Description: ARN of the scanner worker role (from scanner stack outputs)\n    Type: String",
                      f"  WorkerRoleArn:\n    Description: ARN of the scanner worker role (from scanner stack outputs)\n    Type: String\n    Default: \"{role_arn}\"",
                  )
                  # Upload pre-populated version
                  s3.put_object(Bucket=bucket, Key="enrollment-prepopulated.yaml",
                                Body=template.encode("utf-8"), ContentType="text/yaml")
                  logger.info("Uploaded pre-populated enrollment template to s3://%s/enrollment-prepopulated.yaml", bucket)
                  _respond(event, context, "SUCCESS", {"TemplateURL": f"https://s3.amazonaws.com/{bucket}/enrollment-prepopulated.yaml"})
              except Exception as e:
                  logger.exception("Failed to generate enrollment template")
                  _respond(event, context, "FAILED", reason=str(e))

          def _respond(event, context, status, data=None, reason=""):
              body = json.dumps({
                  "Status": status,
                  "Reason": reason or f"See CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data or {},
              }).encode("utf-8")
              req = Request(event["ResponseURL"], data=body, method="PUT")
              req.add_header("Content-Type", "")
              req.add_header("Content-Length", str(len(body)))
              urlopen(req)

  EnrollmentTemplateResource:
    Type: AWS::CloudFormation::CustomResource
    DependsOn: CodeBuild
    Properties:
      ServiceToken: !GetAtt EnrollmentTemplateLambda.Arn
      DeployBucket: !Ref DeployBucket
      ScannerAccountId: !Ref "AWS::AccountId"
      WorkerRoleArn: !GetAtt WorkerRole.Arn

  # ── CloudWatch Audit Log ───────────────────────────────────────────
  AuditLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub scan-audit-${AWS::StackName}
      RetentionInDays: 90

  # ── Scanner Worker Fleet ────────────────────────────────────────────
  WorkerSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref BaseVPC
      GroupDescription: Scanner workers - private subnet, default allow-all egress
      Tags:
        - Key: Name
          Value: !Sub WorkerSecGroup-${AWS::StackName}

  WorkerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: WorkerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ChangeMessageVisibility
                Resource: !GetAtt ScanQueue.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub "${ScanBucket.Arn}/*"
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub "${ScanBucket.Arn}"
              - Effect: Allow
                Action: s3:PutObjectTagging
                Resource: !Sub "${SourceBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectTagging
                Resource: !Sub "${QuarantineBucket.Arn}/*"
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "arn:aws:s3:::${DeployBucket}/*"
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action: ec2:DescribeInstances
                Resource: "*"
              - Effect: Allow
                Action: autoscaling:CompleteLifecycleAction
                Resource: !Sub "arn:aws:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup:*:autoScalingGroupName/worker-asg-${AWS::StackName}"

  WorkerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref WorkerRole

  WorkerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    DependsOn:
      - ServiceGatewayASG
      - CodeBuild
    Properties:
      LaunchTemplateName: !Sub worker-${AWS::StackName}
      LaunchTemplateData:
        ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
        InstanceType: !Ref WorkerInstanceType
        IamInstanceProfile:
          Arn: !GetAtt WorkerInstanceProfile.Arn
        SecurityGroupIds:
          - !Ref WorkerSecGroup
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 20
              VolumeType: gp3
              Encrypted: true
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub Worker-${AWS::StackName}
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail
            exec > /var/log/scanner-bootstrap.log 2>&1

            yum install -y python3.12 python3.12-pip unzip

            mkdir -p /opt/scanner
            aws s3 cp s3://${DeployBucket}/scanner-app.zip /opt/scanner/scanner-app.zip
            cd /opt/scanner && unzip -o scanner-app.zip
            pip3.12 install -r requirements.txt

            cat > /etc/scanner.env << 'ENVEOF'
            AWS_DEFAULT_REGION=${AWS::Region}
            SQS_QUEUE_URL=${ScanQueue}
            SQS_VISIBILITY_TIMEOUT=300
            MAX_CONCURRENT_SCANS=${WorkerConcurrency}
            ASG_NAME=worker-asg-${AWS::StackName}
            ALB_ENDPOINT=${ScannerALB.DNSName}:443
            ALB_CA_CERT_SECRET_ARN=arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/alb-ca-cert
            SG_DISCOVERY_TAG=appliance-v1fs:stack=${AWS::StackName}
            SG_CA_CERT_SECRET_ARN=arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/sg-ca-cert
            V1FS_API_KEY_SECRET_ARN=arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:appliance-v1fs/vision-one-api-key
            AUDIT_LOG_GROUP=scan-audit-${AWS::StackName}
            PML_ENABLED=${PMLEnabled}
            FEEDBACK_ENABLED=${SmartFeedbackEnabled}
            MAX_FILE_SIZE_MB=${MaxFileSizeMB}
            SCANNER_ACCOUNT_ID=${AWS::AccountId}
            SOURCE_BUCKET=${SourceBucket}
            QUARANTINE_BUCKET=${QuarantineBucket}
            CUSTOMER_LOG_GROUP=v1fs-scan-audit
            LOG_LEVEL=INFO
            ENVEOF

            cat > /etc/systemd/system/scanner.service << 'SVCEOF'
            [Unit]
            Description=File Scanner Worker
            After=network.target

            [Service]
            EnvironmentFile=/etc/scanner.env
            ExecStart=/usr/bin/python3.12 /opt/scanner/scanner.py
            Restart=always
            RestartSec=5
            KillSignal=SIGTERM
            TimeoutStopSec=330

            [Install]
            WantedBy=multi-user.target
            SVCEOF

            systemctl daemon-reload
            systemctl enable scanner
            systemctl start scanner

  WorkerASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn:
      - ServiceGatewayASG
      - CodeBuild
    Properties:
      AutoScalingGroupName: !Sub worker-asg-${AWS::StackName}
      LaunchTemplate:
        LaunchTemplateId: !Ref WorkerLaunchTemplate
        Version: !GetAtt WorkerLaunchTemplate.LatestVersionNumber
      MinSize: !Ref WorkerMinCount
      MaxSize: !Ref WorkerMaxCount
      DesiredCapacity: !Ref WorkerMinCount
      VPCZoneIdentifier:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      HealthCheckType: EC2
      HealthCheckGracePeriod: 180
      DefaultInstanceWarmup: 120
      Tags:
        - Key: Name
          Value: !Sub Worker-${AWS::StackName}
          PropagateAtLaunch: false

  WorkerTerminationHook:
    Type: AWS::AutoScaling::LifecycleHook
    Properties:
      LifecycleHookName: WorkerTerminationHook
      AutoScalingGroupName: !Ref WorkerASG
      LifecycleTransition: autoscaling:EC2_INSTANCE_TERMINATING
      HeartbeatTimeout: 330
      DefaultResult: CONTINUE

  WorkerScaleOutPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerASG
      PolicyType: StepScaling
      AdjustmentType: ChangeInCapacity
      EstimatedInstanceWarmup: 120
      StepAdjustments:
        - MetricIntervalLowerBound: 0
          MetricIntervalUpperBound: 1000
          ScalingAdjustment: 1
        - MetricIntervalLowerBound: 1000
          MetricIntervalUpperBound: 5000
          ScalingAdjustment: 2
        - MetricIntervalLowerBound: 5000
          ScalingAdjustment: 4

  WorkerScaleOutAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-worker-scale-out
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 100
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScanQueue.QueueName
      AlarmActions:
        - !Ref WorkerScaleOutPolicy

  WorkerScaleInPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerASG
      PolicyType: StepScaling
      AdjustmentType: ChangeInCapacity
      EstimatedInstanceWarmup: 300
      StepAdjustments:
        - MetricIntervalUpperBound: 0
          ScalingAdjustment: -1

  WorkerScaleInAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-worker-scale-in
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 10
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScanQueue.QueueName
      AlarmActions:
        - !Ref WorkerScaleInPolicy

  ProvisionerLayer:
    Type: AWS::Lambda::LayerVersion
    DependsOn: CodeBuild
    Properties:
      LayerName: !Sub provisioner-deps-${AWS::StackName}
      Content:
        S3Bucket: !Ref DeployBucket
        S3Key: provisioner-layer.zip
      CompatibleRuntimes:
        - python3.12

  # ── Alarms & Notifications ─────────────────────────────────────────
  AlarmSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub scan-alarms-${AWS::StackName}
      Tags:
        - Key: Name
          Value: !Sub AlarmSNSTopic-${AWS::StackName}

  DLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-dlq-messages
      AlarmDescription: Messages in the dead-letter queue indicate scan failures after 3 retries
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScanDLQ.QueueName
      AlarmActions:
        - !Ref AlarmSNSTopic
      OKActions:
        - !Ref AlarmSNSTopic

  QueueAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-queue-age
      AlarmDescription: Oldest message age exceeds 20 minutes for 5 consecutive minutes — scanner may be stuck or unable to keep up
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 5
      Threshold: 1200
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScanQueue.QueueName
      AlarmActions:
        - !Ref AlarmSNSTopic
      OKActions:
        - !Ref AlarmSNSTopic

  QueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-queue-depth
      AlarmDescription: Queue depth exceeds 10,000 messages for 5 consecutive minutes — scanners may be down or overwhelmed
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 5
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScanQueue.QueueName
      AlarmActions:
        - !Ref AlarmSNSTopic
      OKActions:
        - !Ref AlarmSNSTopic

