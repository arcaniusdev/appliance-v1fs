version: 0.2

phases:
  build:
    commands:
      # ── Scanner worker application ───────────────────────────────
      - cd $CODEBUILD_SRC_DIR/app && zip /tmp/scanner-app.zip scanner.py requirements.txt
      - aws s3 cp /tmp/scanner-app.zip s3://$DEPLOY_BUCKET/scanner-app.zip

      # ── Provisioner Lambda layer (paramiko only) ──────────────────
      - cd $CODEBUILD_SRC_DIR
      - mkdir -p /tmp/prov-layer/python
      - "pip install -r lambda/provisioner/requirements.txt -t /tmp/prov-layer/python --platform manylinux2014_x86_64 --only-binary=:all: --python-version 3.12 --implementation cp"
      - cd /tmp/prov-layer && zip -r /tmp/provisioner-layer.zip python/
      - ls -lh /tmp/provisioner-layer.zip
      - aws s3 cp /tmp/provisioner-layer.zip s3://$DEPLOY_BUCKET/provisioner-layer.zip

      # ── AWS CLI v2 binary (stored on S3, downloaded to /tmp at runtime) ──
      - curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscli.zip
      - cd /tmp && unzip -q awscli.zip && ./aws/install --install-dir /tmp/awscli-dist --bin-dir /tmp/awscli-bin
      # Zip just the versioned dist dir (the actual PyInstaller binary + libs)
      - |
        VERSION=$(ls /tmp/awscli-dist/v2/ | grep -v current | head -1)
        echo "AWS CLI version: $VERSION"
        cd /tmp/awscli-dist/v2/$VERSION && zip -r /tmp/awscli-runtime.zip dist/
        ls -lh /tmp/awscli-runtime.zip
      - aws s3 cp /tmp/awscli-runtime.zip s3://$DEPLOY_BUCKET/awscli-runtime.zip

      # ── Provisioner Lambda code ───────────────────────────────────
      - cd $CODEBUILD_SRC_DIR/lambda/provisioner && zip /tmp/provisioner-code.zip handler.py ssh_helper.py eice_tunnel.py
      - aws s3 cp /tmp/provisioner-code.zip s3://$DEPLOY_BUCKET/provisioner-code.zip

      # ── Enrollment template (raw, pre-populated by custom resource after stack creation)
      - aws s3 cp $CODEBUILD_SRC_DIR/enrollment.yaml s3://$DEPLOY_BUCKET/enrollment.yaml
